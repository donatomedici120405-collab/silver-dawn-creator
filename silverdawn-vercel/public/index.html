      const dupB=document.createElement('button');dupB.className='li-b';dupB.textContent='⧉';

      lst.appendChild(it);
    });
    div.appendChild(lst);

function renderTplGrid(g,page){
  if(!g)return;
  TPLS.forEach(t=>{
    const card=document.createElement('div');card.className='tc'+(page.tpl===t.id?' active':'');
    card.onclick=()=>{
      page.tpl=t.id;
      // Reset draw cell when changing template
      ST.drawCell=null;
      addHist('Plantilla');renderBook();renderLP();scheduleSave();
    };
    const prev=document.createElement('div');prev.className='tp'+(t.o==='h'?' h':'');
    if(t.o==='h'){t.rows.forEach(r=>{const col=document.createElement('div');col.className='tr';for(let i=0;i<r.c;i++){const cl=document.createElement('div');cl.className='tcl';col.appendChild(cl);}prev.appendChild(col);});}
    else{t.rows.forEach(r=>{const row=document.createElement('div');row.className='tr';for(let i=0;i<r.c;i++){const cl=document.createElement('div');cl.className='tcl';row.appendChild(cl);}prev.appendChild(row);});}
    const nm=document.createElement('div');nm.className='tn';nm.textContent=t.n;
    card.appendChild(prev);card.appendChild(nm);g.appendChild(card);
  });
}

function renderSavedColors(c, context){
  if(!proj.savedColors)proj.savedColors=['#7ec8e3','#c8d8e8','#000','#fff','#ff3b3b','#ffd93d'];
  const div=document.createElement('div');
  div.innerHTML='<div class="sec">Colores guardados</div>';
  const wrap=document.createElement('div');wrap.className='saved-color-wrap';
  proj.savedColors.forEach(function(col,i){
    const sw=document.createElement('div');sw.className='saved-sw';
    sw.style.background=col;sw.title=col;
    sw.onclick=function(){
      if(context==='bubble'){const tc=document.getElementById('ebTC')||document.getElementById('bTC');if(tc){tc.value=col;if(document.getElementById('ebTC'))updateSelBub();}}
      else if(context==='text'){const tc=document.getElementById('txC');if(tc)tc.value=col;}
    };
    sw.oncontextmenu=function(e){e.preventDefault();if(confirm('¿Quitar este color?')){proj.savedColors.splice(i,1);renderLP();scheduleSave();}};
    wrap.appendChild(sw);
  });
  const addBtn=document.createElement('div');addBtn.className='add-color-btn';addBtn.textContent='+';addBtn.title='Guardar color';
  addBtn.onclick=function(){const pick=document.getElementById('savedColorPick');const col=pick?pick.value:'#7ec8e3';if(!proj.savedColors.includes(col)){proj.savedColors.push(col);if(proj.savedColors.length>16)proj.savedColors.shift();renderLP();scheduleSave();}};
  wrap.appendChild(addBtn);
  const cw=document.createElement('div');cw.className='cw';cw.style.marginLeft='4px';
  const cp=document.createElement('input');cp.type='color';cp.id='savedColorPick';cp.value='#7ec8e3';cp.title='Elegí color a guardar';
  const sp=document.createElement('span');sp.textContent='Guardar';sp.style.cursor='pointer';
  sp.onclick=function(){const col=cp.value;if(!proj.savedColors.includes(col)){proj.savedColors.push(col);if(proj.savedColors.length>16)proj.savedColors.shift();renderLP();scheduleSave();}};
  cw.appendChild(cp);cw.appendChild(sp);wrap.appendChild(cw);
  div.appendChild(wrap);c.appendChild(div);
}

  addHist('Sangrado');renderBook();scheduleSave();

function updateSelBub(){
  if(!ST.selBub)return;
  const b=ST.selBub.b;const pi=ST.selBub.pageIdx;
  // Verify bubble still exists in data
  const page=proj.pages[pi];
  if(!page||(page.bubbles||[]).findIndex(bx=>bx.id===b.id)<0){ST.selBub=null;renderLP();return;}
  const prevType=b.type;
  const t=document.getElementById('ebTxt');
  const f=document.getElementById('ebFont');
  const tc=document.getElementById('ebTC');
  const rc=document.getElementById('ebRC');
  const bg=document.getElementById('ebBG');
  const sc=document.getElementById('ebSC');
  const tp=document.getElementById('ebType');
  if(t)b.text=t.value;
  if(f)b.font=f.value;
  if(tc)b.tc=tc.value;
  if(rc)b.brc=rc.value;
  if(bg)b.bgc=bg.value;
  if(sc)b.sc=sc.value;
  if(tp)b.type=tp.value;
  const fsEl=document.getElementById('ebFs');if(fsEl)b.fontSize=parseInt(fsEl.value);
  // If only colors/text/font changed (not type), update inline for smoothness
  if(b.type===prevType){
    const wrap=document.getElementById(`bub-${b.id}`);
    if(wrap){
      const bi=wrap.querySelector('.bi');
      if(bi){
        bi.textContent=b.text;
        bi.style.fontFamily=b.font;
        bi.style.color=b.tc;
        bi.style.background=b.bgc;
        bi.style.borderColor=b.brc;
      }
      updateTailSVG(b,Number(b.w||100),Number(b.h||60));
    }
    scheduleSave();
    return;
  }
  // Type changed — need full re-render for CSS class update
  renderBook();
  scheduleSave();
}

function renderBubTemplates(c){
  const tmpl=proj.savedBubbleTemplates||[];
  const div=document.createElement('div');
  div.innerHTML='<div class="sec">Plantillas guardadas</div>';
  const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:4px;';
  const icons={speech:'💬',thought:'💭',shout:'💥',narrator:'📦',whisper:'🤫'};
  // 8 slots
  for(let i=0;i<8;i++){
    const slot=document.createElement('div');
    if(i<tmpl.length){
      const t=tmpl[i];
      slot.className='bub-slot';
      slot.innerHTML=`<span style="font-size:11px">${icons[t.type]||'💬'}</span><span class="bub-slot-name" style="flex:1">${t.name||t.type}</span><button class="li-b" style="color:var(--ac);font-size:10px" onclick="deleteBubTemplate(${i})">✕</button>`;
      slot.onclick=e=>{if(e.target.classList.contains('li-b'))return;applyBubTemplate(t);};
    } else {
      slot.className='bub-slot empty';
      slot.innerHTML=`<span class="bub-slot-name" style="color:var(--br)">— vacío ${i+1} —</span>`;
    }
    grid.appendChild(slot);
  }
  div.appendChild(grid);c.appendChild(div);
}

function saveBubTemplate(){
  const tmpl=proj.savedBubbleTemplates||[];
  if(tmpl.length>=8){alert('Máximo 8 plantillas. Borrá una primero.');return;}
  const t={
    name:prompt('Nombre de la plantilla:','Mi Globo')||'Globo',
    type:document.getElementById('bType')?.value||'speech',
    font:document.getElementById('bFont')?.value||"'Bangers',cursive",
    tc:document.getElementById('bTC')?.value||'#000',
    brc:document.getElementById('bRC')?.value||'#000',
    bgc:document.getElementById('bBG')?.value||'#fff',
    sc:document.getElementById('bSC')?.value||'#fff',
  };
  proj.savedBubbleTemplates=tmpl;tmpl.push(t);
  renderLP();scheduleSave();
}

function applyBubTemplate(t){
  const bType=document.getElementById('bType');const bFont=document.getElementById('bFont');
  const bTC=document.getElementById('bTC');const bRC=document.getElementById('bRC');
  const bBG=document.getElementById('bBG');const bSC=document.getElementById('bSC');
  if(bType)bType.value=t.type;if(bFont)bFont.value=t.font;
  if(bTC)bTC.value=t.tc;if(bRC)bRC.value=t.brc;
  if(bBG)bBG.value=t.bgc;if(bSC)bSC.value=t.sc;
}

function deleteBubTemplate(i){
  if(confirm('¿Borrar esta plantilla?')){proj.savedBubbleTemplates.splice(i,1);renderLP();scheduleSave();}
}

function addBubble(){
  const page=apg();if(!page){alert('Seleccioná una página.');return;}
  if(!page.bubbles)page.bubbles=[];
  page.bubbles.push({
    id:Date.now(),type:document.getElementById('bType').value,
    text:document.getElementById('bTxt').value||'...',
    font:document.getElementById('bFont').value,
    tc:document.getElementById('bTC').value,brc:document.getElementById('bRC').value,
    bgc:document.getElementById('bBG').value,sc:document.getElementById('bSC').value,
    x:30,y:30,w:110,h:70,tailAngle:225,tailLen:28
  });
  addHist('Globo añadido');renderBook();renderLP();renderThumbStrip();scheduleSave();
}

    wRow.appendChild(btn);

  r4.appendChild(wRow);c.appendChild(r4);

  // Arc / curve
  const rarc=document.createElement('div');rarc.style.marginBottom='6px';

function updateTxtEl(t){
  const el=document.getElementById('ft-'+t.id);if(!el)return;
  const inner=el.querySelector('.ft-in');if(!inner)return;
  const strokeCss=t.strokeVal&&t.strokeVal!=='none'?'-webkit-text-stroke:'+t.strokeVal+';paint-order:stroke fill;':'';
  // If arc is set, render as SVG textPath
  if(t.arc&&t.arc!==0){
    const w=el.offsetWidth||150;const arc=t.arc;
    const r=Math.abs(10000/arc);// larger radius = less curve
    const sweep=arc>0?1:0;
    const startY=arc>0?r:20;
    const midX=w/2;
    const svgId='arc-'+t.id;
    inner.innerHTML='<svg width="'+w+'" height="60" xmlns="http://www.w3.org/2000/svg" overflow="visible">'
      +'<defs><path id="'+svgId+'" d="M 0 '+startY+' Q '+midX+' '+(arc>0?startY-Math.abs(arc):startY+Math.abs(arc))+' '+w+' '+startY+'"/></defs>'
      +'<text font-family="'+t.font+'" font-size="'+t.size+'px" font-weight="'+(t.weight||700)+'" fill="'+t.color+'" text-anchor="middle"'+(t.shadow?' filter="url(#s'+t.id+')"':'')+'>'
      +'<textPath href="#'+svgId+'" startOffset="50%">'+t.text+'</textPath></text>'
      +'</svg>';
    inner.style.cssText='cursor:move;';
  } else {
    inner.innerHTML='';
    inner.style.cssText='font-family:'+t.font+';font-size:'+t.size+'px;color:'+t.color+';font-weight:'+(t.weight||700)+';text-shadow:'+(t.shadow||'none')+';'+strokeCss+'letter-spacing:'+(t.ls||0)+'px;line-height:'+(t.lh||1.4)+';text-align:'+(t.align||'left')+';cursor:move;';
    inner.textContent=t.text;
  }
}

function getArr(type,page){return type==='bub'?(page.bubbles||[]):type==='sfx'?(page.sfx||[]):(page.texts||[]);}
function moveLayer(type,id,dir){
  const page=apg();const arr=getArr(type,page);
  const i=arr.findIndex(e=>e.id===Number(id)||e.id===id);if(i<0)return;
  const ni=dir==='up'?i-1:i+1;if(ni<0||ni>=arr.length)return;
  [arr[i],arr[ni]]=[arr[ni],arr[i]];addHist('Capa movida');renderBook();renderLP();scheduleSave();
}
function delLayerEl(type,id,pageIdx){
  const nid=Number(id);
  if(type==='bub')delBub(nid,pageIdx);
  else if(type==='sfx')delSfx(nid,pageIdx);
  else delTxt(nid,pageIdx);
}

async function sendAI(presetText){
  const inp=document.getElementById('aiIn');const msgs=document.getElementById('aiMsgs');if(!msgs)return;
  const text=presetText||(inp?inp.value.trim():'');if(!text)return;
  if(inp)inp.value='';
  ST.aiHistory.push({role:'user',text});
  const um=document.createElement('div');um.className='ai-msg us';um.textContent=text;msgs.appendChild(um);
  const typing=document.createElement('div');typing.style.cssText='display:flex;gap:3px;align-items:center;padding:6px 9px;';
  typing.innerHTML='<div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>';
  msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;
  try{
    // Use backend proxy when published, fallback message when local
    const isLocal=window.location.protocol==='file:';
    if(isLocal){
      typing.remove();
      const em=document.createElement('div');em.className='ai-msg cl';
      em.textContent='⚠️ La IA funciona cuando la app está publicada en silverdawn.vercel.app. Mientras tanto podés hablar con Claude en claude.ai';
      msgs.appendChild(em);msgs.scrollTop=msgs.scrollHeight;
      ST.aiHistory.push({role:'assistant',text:em.textContent});
      return;
    }
    const apiUrl='/api/chat';
    const res=await fetch(apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:'Sos un asistente experto en creación de cómics dentro de Silver Dawn Creator. Ayudás con diálogos, layouts, composición visual, paletas de color, narrativa y guión. Respuestas concisas y prácticas en español. Cuando sugerís diálogos, dálos entre comillas listos para usar.',messages:ST.aiHistory.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.text}))})});
    const data=await res.json();typing.remove();
    if(data.error){
      const errMsg='Error API: '+data.error.message;
      ST.aiHistory.push({role:'assistant',text:errMsg});
      const em=document.createElement('div');em.className='ai-msg cl';em.textContent=errMsg;msgs.appendChild(em);msgs.scrollTop=msgs.scrollHeight;
      return;
    }
    const reply=data.content?.[0]?.text||'No pude procesar.';
    ST.aiHistory.push({role:'assistant',text:reply});
    const am=document.createElement('div');am.className='ai-msg cl';am.textContent=reply;msgs.appendChild(am);msgs.scrollTop=msgs.scrollHeight;
  }catch(e){
    typing.remove();
    // Detect file:// protocol — API calls blocked by browser
    const isLocal=window.location.protocol==='file:';
    const errText=isLocal
      ? '⚠️ La IA requiere que la app esté publicada en un servidor. Abrí la app desde un servidor local o publicala en la web. Por ahora podés hablar conmigo directamente en claude.ai'
      : 'Error de conexión: '+e.message;
    const em=document.createElement('div');em.className='ai-msg cl';em.textContent=errText;msgs.appendChild(em);msgs.scrollTop=msgs.scrollHeight;
    ST.aiHistory.push({role:'assistant',text:errText});
  }
}

async function exportSelectedPages(modal){
  const checked=[...modal.querySelectorAll('[id^=epg]:checked')].map(el=>parseInt(el.value));

  const{jsPDF}=window.jspdf;
  const origSpread=ST.spread;const origEdit=ST.editPage;

      const fs=Math.max(11,Math.round(bh*0.26));
      bi.style.cssText='font-family:'+b.font+';font-size:'+fs+'px;color:'+b.tc+';background:'+b.bgc+';border-color:'+b.brc+';';
      bi.textContent=b.text;
      // Tail SVG
      const svgNS='http://www.w3.org/2000/svg';const svg=document.createElementNS(svgNS,'svg');
      svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1;';
      if(b.type!=='narrator'&&b.type!=='shout'){
        const ta=b.tailAngle!==undefined?b.tailAngle:225;const tl=b.tailLen||28;
        const ra=(ta*Math.PI)/180;const cx2=bw2/2;const cy=bh/2;
        const ex=cx2+Math.cos(ra)*bw2*0.42;const ey=cy+Math.sin(ra)*bh*0.42;
        const tipX=ex+Math.cos(ra)*tl;const tipY=ey+Math.sin(ra)*tl;
        const pr2=(ta+90)*Math.PI/180;const tw=6;
        const p1x=ex+Math.cos(pr2)*tw;const p1y=ey+Math.sin(pr2)*tw;
        const p2x=ex-Math.cos(pr2)*tw;const p2y=ey-Math.sin(pr2)*tw;
        const inset3=3;
        const p1xv=p1x-Math.cos(pr2)*inset3;const p1yv=p1y-Math.sin(pr2)*inset3;
        const p2xv=p2x+Math.cos(pr2)*inset3;const p2yv=p2y+Math.sin(pr2)*inset3;
        const polyFv=document.createElementNS(svgNS,'polygon');
        polyFv.setAttribute('points',p1xv+','+p1yv+' '+p2xv+','+p2yv+' '+tipX+','+tipY);
        polyFv.setAttribute('fill',b.bgc||'#fff');polyFv.setAttribute('stroke','none');
        svg.appendChild(polyFv);
        const olv=document.createElementNS(svgNS,'polyline');
        olv.setAttribute('points',p1xv+','+p1yv+' '+tipX+','+tipY+' '+p2xv+','+p2yv);
        olv.setAttribute('fill','none');olv.setAttribute('stroke',b.brc||'#000');olv.setAttribute('stroke-width','2');
        olv.setAttribute('stroke-linejoin','round');olv.setAttribute('stroke-linecap','round');
        svg.appendChild(olv);
      }
      bEl.appendChild(svg);bEl.appendChild(bi);inner.appendChild(bEl);
    });
    (page.sfx||[]).forEach(s=>{const el=document.createElement('div');el.style.cssText='position:absolute;left:'+s.x+'px;top:'+s.y+'px;font-size:'+s.size+'px;color:'+s.color+';transform:rotate('+s.rot+'deg);-webkit-text-stroke:2px '+s.stroke+';font-family:Bangers,cursive;letter-spacing:2px;pointer-events:none;';el.textContent=s.text;inner.appendChild(el);});
    (page.texts||[]).forEach(t=>{const el=document.createElement('div');el.style.cssText='position:absolute;left:'+t.x+'px;top:'+t.y+'px;width:'+(t.w||120)+'px;font-family:'+t.font+';font-size:'+t.size+'px;color:'+t.color+';font-weight:'+(t.weight||700)+';letter-spacing:'+(t.ls||0)+'px;line-height:'+(t.lh||1.4)+';text-align:'+(t.align||'left')+';text-shadow:'+(t.shadow?'1px 1px 2px '+t.shadow:'none')+';pointer-events:none;';el.textContent=t.text;inner.appendChild(el);});
    c.appendChild(inner);
  }
}
function flip(d){
  const ns=sp+d;if(ns<0||ns>mS())return;
  const b=document.querySelector('.book');
  b.style.transition='opacity .3s,transform .3s';b.style.opacity='0';b.style.transform='rotateY('+(d>0?-7:7)+'deg) scale(.97)';
  setTimeout(()=>{sp=ns;render();b.style.transition='none';b.style.opacity='0';b.style.transform='rotateY('+(d>0?7:-7)+'deg) scale(.97)';setTimeout(()=>{b.style.transition='opacity .35s,transform .35s';b.style.opacity='1';b.style.transform='none';},20);},290);
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')flip(1);if(e.key==='ArrowLeft'||e.key==='ArrowUp')flip(-1);});
render();
<\/script></body></html>`;
