<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silver Dawn Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bangers&family=Comic+Neue:wght@700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&family=Permanent+Marker&family=Oswald:wght@700&family=Creepster&family=Pacifico&family=Russo+One&family=Boogaloo&family=Squada+One&family=Black+Han+Sans&family=Righteous&family=Bungee&family=Fredoka+One&family=Lilita+One&family=Titan+One&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0e1420;--pb:#131c2e;--su:#1a2540;--su2:#1f2d4e;--br:#2a3d60;
  --ac:#7ec8e3;--a2:#c8d8e8;--a3:#a8dde9;--a4:#8bb8d4;
  --tx:#dce8f0;--mu:#5a7a90;--wh:#f0f6fa;
  --pw:360px;--ph:480px;
}
.light{--ink:#e8eff6;--pb:#f0f6fa;--su:#fff;--su2:#e4eef5;--br:#b8d0e0;--tx:#1a2a3a;--mu:#4a6a80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);color:var(--tx);font-family:'Barlow',sans-serif;height:100vh;overflow:hidden;transition:background .3s,color .3s;}

/* ── LOBBY ── */
#lobby{position:fixed;inset:0;z-index:1000;background:var(--ink);display:flex;flex-direction:column;transition:opacity .4s;}
#lobby.hidden{opacity:0;pointer-events:none;}
.lbg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(126,200,227,.1) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(168,221,233,.07) 0%,transparent 50%);pointer-events:none;}
.lh{padding:28px 44px 0;display:flex;align-items:flex-end;gap:14px;}
.llogo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:5px;color:var(--wh);line-height:1;}
.llogo span{color:var(--ac);}
.llogo sup{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--a2);letter-spacing:2px;vertical-align:super;}
.lsub{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--mu);padding-bottom:7px;}
.lbody{flex:1;padding:28px 44px;overflow-y:auto;display:flex;flex-direction:column;gap:22px;}
.lsec{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--mu);display:flex;align-items:center;gap:8px;}
.lsec::after{content:'';flex:1;height:1px;background:var(--br);}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.pcard{background:var(--su);border:1px solid var(--br);border-radius:4px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.pcard:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.4);}
.pprev{width:100%;aspect-ratio:3/4;background:var(--su2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:32px;}
.pprev img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.pinfo{padding:9px 11px;}
.pname{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;outline:none;border:none;background:transparent;width:100%;}
.pname:focus{border-bottom:1px solid var(--ac);}
.pmeta{font-size:9px;color:var(--mu);line-height:1.7;}
.pdel{position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:var(--mu);cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;}
.pcard:hover .pdel{display:flex;}.pdel:hover{background:var(--ac);color:#fff;}
.npc{background:transparent;border:2px dashed var(--br);border-radius:4px;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;}
.npc:hover{border-color:var(--a2);}
.npc-i{font-size:28px;opacity:.35;}
.npc-l{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);}
.npc:hover .npc-l{color:var(--a2);}
.lbtn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;border-radius:3px;cursor:pointer;transition:all .18s;border:none;}
.lbp{background:var(--ac);color:#fff;}.lbp:hover{background:#e02020;transform:translateY(-1px);}
.lbg2{background:transparent;color:var(--mu);border:1px solid var(--br);}.lbg2:hover{color:var(--tx);border-color:var(--mu);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;}
#app.visible{display:flex;}

/* TOPBAR */
.topbar{background:var(--pb);border-bottom:2px solid var(--ac);padding:0 10px;height:46px;display:flex;align-items:center;gap:5px;flex-shrink:0;z-index:200;}
.tl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--wh);white-space:nowrap;}.tl span{color:var(--ac);}
.tsep{width:1px;height:22px;background:var(--br);}
.tb{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 8px;border:1px solid var(--br);border-radius:3px;cursor:pointer;background:var(--su);color:var(--mu);transition:all .15s;white-space:nowrap;}
.tb:hover{color:var(--tx);border-color:var(--mu);}
.tb.on{background:var(--ac);color:#fff;border-color:var(--ac);}
.tb.y{background:var(--a2);color:#000;border-color:var(--a2);}
.tb.g{color:var(--a3);border-color:var(--a3);}.tb.g:hover{background:var(--a3);color:#000;}
.tb.v{color:var(--a4);border-color:var(--a4);}.tb.v:hover{background:var(--a4);color:#fff;}
.tb.d{color:var(--ac);border-color:var(--ac);}.tb.d:hover{background:var(--ac);color:#fff;}
.sp{flex:1;}
.pnt{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);background:transparent;border:none;outline:none;cursor:text;text-align:center;max-width:200px;}
.pnt:focus{border-bottom:1px solid var(--a2);color:var(--tx);}
.ss{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;color:var(--mu);text-transform:uppercase;white-space:nowrap;}
.ss.ok{color:var(--a3);}

/* MAIN */
.main-layout{display:grid;grid-template-columns:240px 1fr;flex:1;overflow:hidden;min-height:0;}
.lp{background:var(--pb);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;}
.lp-tabs{display:flex;border-bottom:1px solid var(--br);flex-shrink:0;}
.lpt{flex:1;padding:7px 2px;background:transparent;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);border-bottom:2px solid transparent;transition:all .15s;}
.lpt:hover{color:var(--tx);}.lpt.active{color:var(--ac);border-bottom-color:var(--ac);}
.lpc{flex:1;overflow-y:auto;padding:11px 10px;}
.lpc::-webkit-scrollbar{width:3px;}.lpc::-webkit-scrollbar-thumb{background:var(--br);}

/* COMMON */
.sec{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin:11px 0 7px;display:flex;align-items:center;gap:5px;}
.sec:first-child{margin-top:0;}.sec::after{content:'';flex:1;height:1px;background:var(--br);}
.cl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:4px;display:block;}
.ri{width:100%;-webkit-appearance:none;height:3px;background:var(--br);border-radius:2px;outline:none;}
.ri::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:var(--ac);border-radius:50%;cursor:pointer;}
.togr{display:flex;gap:3px;}
.tog{flex:1;padding:4px 2px;background:var(--su2);border:1px solid var(--br);color:var(--mu);font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .15s;}
.tog.active{background:var(--ac);color:#fff;border-color:var(--ac);}
.tog:hover:not(.active){border-color:var(--mu);color:var(--tx);}
.sr{display:flex;gap:4px;flex-wrap:wrap;}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.sw.active{border-color:#fff;transform:scale(1.2);}
select.bs,input.bx{width:100%;background:var(--su2);border:1px solid var(--br);color:var(--tx);padding:4px 6px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;outline:none;cursor:pointer;}
select.bs option{background:var(--su2);}
.bx:focus,select.bs:focus{border-color:var(--ac);}
.cp{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.cw{display:flex;align-items:center;gap:4px;}
.cw input[type=color]{width:22px;height:22px;border:none;padding:0;background:none;cursor:pointer;border-radius:50%;overflow:hidden;}
.cw span{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);}
.abb{width:100%;padding:6px;border:none;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-top:5px;}
.abb.r{background:var(--ac);color:#fff;}.abb.r:hover{background:#e02020;}
.abb.g{background:var(--a3);color:#000;}
.abb.v{background:var(--a4);color:#fff;}

/* TEMPLATE GRID */
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.tc{background:var(--su);border:2px solid var(--br);border-radius:3px;padding:5px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tc:hover{border-color:var(--ac);}.tc.active{border-color:var(--ac);background:rgba(255,59,59,.1);}
.tp{width:100%;aspect-ratio:2/3;background:var(--su2);display:flex;flex-direction:column;gap:2px;padding:2px;}
.tp.h{aspect-ratio:3/2;flex-direction:row;}
.tr{display:flex;gap:2px;flex:1;}
.tp.h .tr{flex-direction:column;}
.tcl{background:var(--br);flex:1;border-radius:1px;}
.tc:hover .tcl,.tc.active .tcl{background:rgba(255,59,59,.5);}
.tn{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);text-align:center;}
.tc.active .tn{color:var(--ac);}

/* LAYER LIST */
.li{background:var(--su);border:1px solid var(--br);border-radius:2px;padding:5px 7px;display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.li.locked{opacity:.6;}
.li-ic{font-size:12px;flex-shrink:0;}
.li-nm{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.li-bts{display:flex;gap:2px;flex-shrink:0;}
.li-b{background:none;border:none;color:var(--mu);cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px;transition:all .15s;}
.li-b:hover{color:var(--tx);background:rgba(255,255,255,.08);}
.hi{background:var(--su);border:1px solid var(--br);border-radius:2px;padding:5px 7px;margin-bottom:3px;}
.hi-t{font-size:8px;color:var(--mu);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.hi-d{font-size:10px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;}

/* PALETTE */
.palg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px;}
.palc{background:var(--su);border:1px solid var(--br);border-radius:3px;padding:7px;cursor:pointer;transition:all .15s;}
.palc:hover{border-color:var(--ac);}
.palsw{display:flex;gap:3px;margin-bottom:3px;}
.palswi{width:12px;height:12px;border-radius:50%;}
.paln{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);}

/* AI */
.ai-wrap{display:flex;flex-direction:column;height:100%;}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:6px;min-height:0;}
.ai-msgs::-webkit-scrollbar{width:2px;}
.ai-msg{padding:7px 9px;border-radius:4px;font-size:11px;line-height:1.5;}
.ai-msg.cl{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--tx);}
.ai-msg.us{background:var(--su2);border:1px solid var(--br);color:var(--mu);text-align:right;}
.ai-quick{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.ai-qb{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 6px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:var(--a4);border-radius:2px;cursor:pointer;transition:all .15s;}
.ai-qb:hover{background:var(--a4);color:#fff;}
.ai-ir{display:flex;gap:4px;flex-shrink:0;margin-top:6px;}
.ai-in{flex:1;background:var(--su2);border:1px solid var(--br);color:var(--tx);padding:5px 7px;border-radius:2px;font-size:10px;outline:none;}
.ai-in:focus{border-color:var(--a4);}
.ai-send{padding:5px 8px;background:var(--a4);color:#fff;border:none;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.ai-dot{width:5px;height:5px;background:var(--a4);border-radius:50%;animation:aiD 1.2s infinite;}
.ai-dot:nth-child(2){animation-delay:.2s;}.ai-dot:nth-child(3){animation-delay:.4s;}
@keyframes aiD{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* BOOK AREA */
.book-area{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);background-image:radial-gradient(circle at 1px 1px,rgba(126,200,227,.06) 1px,transparent 0);background-size:22px 22px;position:relative;}
.nav-a{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid var(--br);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--mu);transition:all .2s;z-index:50;}
.nav-a:hover{border-color:var(--ac);color:var(--tx);}
#navPrev{left:10px;}#navNext{right:10px;}
.page-ind{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);background:rgba(0,0,0,.5);backdrop-filter:blur(6px);padding:3px 10px;border-radius:10px;z-index:50;}
.zoom-ctrl{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid var(--br);border-radius:20px;padding:5px 12px;z-index:50;}
.zb{background:none;border:none;color:var(--mu);cursor:pointer;font-size:15px;width:20px;text-align:center;transition:color .15s;}
.zb:hover{color:var(--tx);}
.zlbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--mu);min-width:34px;text-align:center;}
.bw{position:relative;transform-origin:center center;transition:transform .25s;}
.book{display:flex;filter:drop-shadow(0 24px 70px rgba(0,0,0,.85));position:relative;}
.book::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:6px;height:100%;background:linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.1),rgba(0,0,0,.5));z-index:10;pointer-events:none;}
.book-page{width:var(--pw);height:var(--ph);background:#fff;position:relative;overflow:hidden;flex-shrink:0;}
.book-page.lp2{border-radius:4px 0 0 4px;box-shadow:inset -3px 0 10px rgba(0,0,0,.12);}
.book-page.rp{border-radius:0 4px 4px 0;box-shadow:inset 3px 0 10px rgba(0,0,0,.12);}

/* THUMBNAIL STRIP */
.thumb-strip{height:62px;background:var(--pb);border-top:1px solid var(--br);display:flex;align-items:center;gap:5px;padding:0 10px;overflow-x:auto;flex-shrink:0;z-index:100;}
.thumb-strip::-webkit-scrollbar{height:3px;}
.thumb-strip::-webkit-scrollbar-thumb{background:var(--br);}
.pg-th{width:34px;height:46px;background:var(--su2);border:2px solid var(--br);border-radius:2px;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;transition:border-color .15s;}
.pg-th:hover{border-color:var(--mu);}
.pg-th.active{border-color:var(--ac);}
.pg-th-img{width:100%;height:100%;object-fit:cover;display:block;}
.pg-th-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:9px;color:rgba(255,255,255,.4);pointer-events:none;}
.th-add{width:34px;height:46px;background:transparent;border:2px dashed var(--br);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mu);flex-shrink:0;transition:all .15s;}
.th-add:hover{border-color:var(--a2);color:var(--a2);}

/* COMIC PAGE INNER */
.cpi{width:100%;height:100%;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden;}
.cpi.horiz{flex-direction:row;}
.bpanel{display:flex;flex:1;}
.cpi.horiz>.bpanel{flex-direction:column;}
.bcell{flex:1;background:#fff;position:relative;overflow:hidden;border:2px solid #000;min-height:16px;min-width:16px;transition:border-color .15s;}
.bcell.grid-bg{background-image:repeating-linear-gradient(#ccc 0 1px,transparent 1px 20px),repeating-linear-gradient(90deg,#ccc 0 1px,transparent 1px 20px);background-size:20px 20px;background-color:#fff;}
.bcell.bleed{border:none!important;}
.bcell.diag-r{clip-path:polygon(14% 0%,100% 0%,86% 100%,0% 100%);}
.bcell.diag-l{clip-path:polygon(0% 0%,86% 0%,100% 100%,14% 100%);}
.bcell img.cp{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;transform-origin:center;will-change:transform;}
.bcell-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none;padding:4px;}
.bcell.has-img .bcell-hint{display:none;}
.hint-icon{font-size:16px;opacity:.35;color:#000;}
.hint-txt{font-size:8px;opacity:.45;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#000;text-align:center;}
.hint-size{font-size:7px;opacity:.6;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;color:#000;text-align:center;}
.cell-inp{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cell-num{position:absolute;top:2px;left:2px;font-family:'Bebas Neue',sans-serif;font-size:8px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.4);padding:0 3px;pointer-events:none;z-index:2;}
.img-pop{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--br);border-radius:3px;padding:3px 7px;display:none;gap:5px;align-items:center;z-index:8;white-space:nowrap;}
.bcell:hover .img-pop{display:flex;}
.icp{background:none;border:none;color:var(--mu);cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px;transition:all .15s;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
.icp:hover{color:#fff;background:rgba(255,255,255,.1);}
/* Cell resize */
.crh{position:absolute;right:-4px;top:0;width:8px;height:100%;cursor:col-resize;z-index:5;background:transparent;transition:background .15s;}
.crh:hover,.crh.drag{background:rgba(255,217,61,.5);}
.crv{position:absolute;bottom:-4px;left:0;width:100%;height:8px;cursor:row-resize;z-index:5;background:transparent;transition:background .15s;}
.crv:hover,.crv.drag{background:rgba(255,217,61,.5);}
/* Cell guides */
.cg{position:absolute;pointer-events:none;z-index:1;}
.cg.h{left:0;right:0;height:1px;background:rgba(59,255,200,.5);}
.cg.v{top:0;bottom:0;width:1px;background:rgba(59,255,200,.5);}
/* Draw canvas */
.dcv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;display:block;}
.dcv.active{pointer-events:all;cursor:crosshair;}

/* COVER */
.cover-wrap{width:100%;height:100%;position:relative;overflow:hidden;background:#111;}
.cover-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;transform-origin:center;will-change:transform;}

// ── SNAP / ALIGNMENT GUIDES ──
const SNAP_THRESH=6; // pixels

function getElementRects(pageIdx, excludeId){
  // Collect bounding boxes of all draggable elements on page
  const rects=[];
  const inner=document.getElementById('inner-'+pageIdx)||document.querySelector('.cover-wrap,.back-wrap');
  if(!inner)return rects;
  const pr=inner.getBoundingClientRect();
  const z=ST.zoom||1;
  inner.querySelectorAll('.fcell,.bub,.sfxel,.freetxt').forEach(el=>{
    if(el.id===excludeId)return;
    const r=el.getBoundingClientRect();
    rects.push({
      l:(r.left-pr.left)/z, t:(r.top-pr.top)/z,
      r:(r.right-pr.left)/z, b:(r.bottom-pr.top)/z,
      cx:(r.left+r.right)/2/z-pr.left/z,
      cy:(r.top+r.bottom)/2/z-pr.top/z
    });
  });
  // Also add page edges
  const pw=inner.offsetWidth/z; const ph=inner.offsetHeight/z;
  rects.push({l:0,t:0,r:pw,b:ph,cx:pw/2,cy:ph/2});
  return rects;
}

function calcSnap(x,y,w,h,pageIdx,excludeId){
  const rects=getElementRects(pageIdx,excludeId);
  let snapX=null,snapY=null,guideLines=[];
  const cx=x+w/2; const cy=y+h/2;
  const r=x+w; const b=y+h;

  rects.forEach(rect=>{
    // Vertical snaps (left edge, center, right edge)
    [[x,rect.l,'v',rect.l],[cx,rect.cx,'v',rect.cx],[r,rect.r,'v',rect.r],
     [x,rect.r,'v',rect.r],[r,rect.l,'v',rect.l]].forEach(([myVal,theirVal,axis,pos])=>{
      if(Math.abs(myVal-theirVal)<SNAP_THRESH){
        const adj=theirVal-myVal;
        if(snapX===null||Math.abs(adj)<Math.abs(snapX)){snapX=adj;guideLines=guideLines.filter(g=>g.axis!=='v');guideLines.push({axis:'v',pos});}
      }
    });
    // Horizontal snaps (top, center, bottom)
    [[y,rect.t,'h',rect.t],[cy,rect.cy,'h',rect.cy],[b,rect.b,'h',rect.b],
     [y,rect.b,'h',rect.b],[b,rect.t,'h',rect.t]].forEach(([myVal,theirVal,axis,pos])=>{
      if(Math.abs(myVal-theirVal)<SNAP_THRESH){
        const adj=theirVal-myVal;
        if(snapY===null||Math.abs(adj)<Math.abs(snapY)){snapY=adj;guideLines=guideLines.filter(g=>g.axis!=='h');guideLines.push({axis:'h',pos});}
      }
    });
  });
  return{snapX:snapX||0,snapY:snapY||0,guides:guideLines};
}

function showSnapGuides(guides,pageIdx){
  clearSnapGuides(pageIdx);
  const inner=document.getElementById('inner-'+pageIdx)||document.querySelector('.cover-wrap,.back-wrap');
  if(!inner)return;
  guides.forEach(g=>{
    const el=document.createElement('div');
    el.className='snap-guide '+g.axis;
    if(g.axis==='v')el.style.left=g.pos+'px';
    else el.style.top=g.pos+'px';
    el.dataset.snapGuide='1';
    inner.appendChild(el);
  });
}

function clearSnapGuides(pageIdx){
  const inner=document.getElementById('inner-'+pageIdx)||document.querySelector('.cover-wrap,.back-wrap');

function snapshotPage(pageIdx){
  // Deep clone the page but strip image data to save memory
  const page=proj.pages[pageIdx];if(!page)return null;
  const snap=JSON.parse(JSON.stringify(page));
  if(snap.images){Object.keys(snap.images).forEach(k=>delete snap.images[k]);}
  if(snap.coverImg)snap.coverImg=null;
  return{pageIdx,snap};
}

function copyStyle(){
  if(!ST.selEl)return;
  const id=ST.selEl.id;const pi=ST.editPage;const page=proj.pages[pi];
  let style=null;
  if(id.startsWith('fc-')){
    const fc=(page.floatCells||[]).find(f=>f.id===parseInt(id.split('-')[1]));
    if(fc)style={type:'fc',shape:fc.shape,bc:fc.bc,bw:fc.bw};
  } else if(id.startsWith('bub-')){
    const b=(page.bubbles||[]).find(b=>b.id===parseInt(id.split('-')[1]));
    if(b)style={type:'bub',bubType:b.type,font:b.font,tc:b.tc,brc:b.brc,bgc:b.bgc,sc:b.sc,tailAngle:b.tailAngle,tailLen:b.tailLen};
  } else if(id.startsWith('ft-')){
    const t=(page.texts||[]).find(t=>t.id===parseInt(id.split('-')[1]));
    if(t)style={type:'txt',font:t.font,size:t.size,color:t.color,weight:t.weight,ls:t.ls,lh:t.lh,align:t.align,shadow:t.shadow,strokeVal:t.strokeVal};
  } else if(id.startsWith('sfx-')){
    const s=(page.sfx||[]).find(s=>s.id===parseInt(id.split('-')[1]));
    if(s)style={type:'sfx',size:s.size,color:s.color,stroke:s.stroke,rot:s.rot};
  }
  if(style){_snapState.copiedStyle=style;setSS('Estilo copiado ✓','ok');setTimeout(()=>setSS('',''),1500);}
}

function pasteStyle(){
  const style=_snapState.copiedStyle;
  if(!style||!ST.selEl)return;
  const id=ST.selEl.id;const pi=ST.editPage;const page=proj.pages[pi];
  if(style.type==='fc'&&id.startsWith('fc-')){
    const fc=(page.floatCells||[]).find(f=>f.id===parseInt(id.split('-')[1]));
    if(fc){fc.shape=style.shape;fc.bc=style.bc;fc.bw=style.bw;addHist('Estilo pegado');renderBook();scheduleSave();}
  } else if(style.type==='bub'&&id.startsWith('bub-')){
    const b=(page.bubbles||[]).find(b=>b.id===parseInt(id.split('-')[1]));
    if(b){Object.assign(b,{type:style.bubType,font:style.font,tc:style.tc,brc:style.brc,bgc:style.bgc,sc:style.sc});addHist('Estilo pegado');renderBook();scheduleSave();}
  } else if(style.type==='txt'&&id.startsWith('ft-')){
    const t=(page.texts||[]).find(t=>t.id===parseInt(id.split('-')[1]));
    if(t){Object.assign(t,{font:style.font,size:style.size,color:style.color,weight:style.weight,ls:style.ls,lh:style.lh,align:style.align,shadow:style.shadow,strokeVal:style.strokeVal});addHist('Estilo pegado');renderBook();scheduleSave();}
  } else if(style.type==='sfx'&&id.startsWith('sfx-')){
    const s=(page.sfx||[]).find(s=>s.id===parseInt(id.split('-')[1]));
    if(s){s.size=style.size;s.color=style.color;s.stroke=style.stroke;s.rot=style.rot;addHist('Estilo pegado');renderBook();scheduleSave();}
  } else {
    setSS('Tipos incompatibles','');setTimeout(()=>setSS('',''),1500);
  }
}

function undo(){
  if(!_undoStack.length)return;
  const snap=_undoStack.pop();
  // Save current state to redo
  const cur=snapshotPage(snap.pageIdx);
  if(cur)_redoStack.push(cur);
  applySnap(snap);
  updateUndoButtons();
}

function redo(){
  if(!_redoStack.length)return;
  const snap=_redoStack.pop();
  const cur=snapshotPage(snap.pageIdx);
  if(cur)_undoStack.push(cur);
  applySnap(snap);
  updateUndoButtons();
}

function applySnap(snap){
  const page=proj.pages[snap.pageIdx];if(!page)return;
  // Restore all fields except images (preserved from current state)
  const savedImages=page.images?JSON.parse(JSON.stringify(page.images)):{};
  const savedDraws=page.draws?JSON.parse(JSON.stringify(page.draws)):{};
  const savedCoverImg=page.coverImg||null;
  Object.assign(page,snap.snap);
  page.images=savedImages;
  page.draws=savedDraws;
  if(page.type==='cover')page.coverImg=savedCoverImg;
  renderBook();renderLP();renderThumbStrip();scheduleSave();
}

  if(br)br.style.opacity=_redoStack.length?'1':'0.35';
}

// ══════════════════════════════════════════
// SPREAD FORMULA — unified for editor & viewer
// spread 0 → pages[0] (cover, left) + pages[1] (right)
// spread N → pages[N*2-1] (left) + pages[N*2] (right)  for N>=1
// ══════════════════════════════════════════
function pagesForSpread(s){
  const li = s===0 ? 0 : s*2-1;
  const ri = s===0 ? 1 : s*2;
  const t=proj.pages.length;
  return{li, ri, lp:li<t?proj.pages[li]:null, rp:ri<t?proj.pages[ri]:null};
}
function maxSpreads(){return Math.ceil((proj.pages.length)/2);}

  const g=document.getElementById('pgrid');g.innerHTML='';
  allProjs.forEach((p,i)=>{
    const card=document.createElement('div');card.className='pcard';
    const prev=document.createElement('div');prev.className='pprev';

    if(coverPg&&coverPg.coverImg){const img=document.createElement('img');img.src=coverPg.coverImg;prev.innerHTML='';prev.appendChild(img);}
    else prev.textContent='📖';
    const info=document.createElement('div');info.className='pinfo';
    const nm=document.createElement('input');nm.className='pname';nm.value=p.name||'Sin título';
    nm.onclick=e=>e.stopPropagation();

    const meta=document.createElement('div');meta.className='pmeta';
    const inner=p.pages?p.pages.filter(pg=>pg.type==='inner').length:0;
    const mod=p.modified?new Date(p.modified).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'—';
    meta.innerHTML=`📅 ${mod}<br>📄 ${p.pages?p.pages.length:0} págs · ${inner} interiores`;
    const del=document.createElement('button');del.className='pdel';del.textContent='×';
    del.onclick=e=>{e.stopPropagation();if(confirm('¿Eliminar?')){allProjs.splice(i,1);saveAllProjs();renderLobby();}};
    info.appendChild(nm);info.appendChild(meta);
    card.appendChild(prev);card.appendChild(info);card.appendChild(del);
    card.onclick=()=>openProj(i);g.appendChild(card);

  const npc=document.createElement('div');npc.className='npc';
  npc.innerHTML='<div class="npc-i">📖</div><div class="npc-l">Nuevo Cómic</div>';
  npc.onclick=newProj;g.appendChild(npc);
}

function mkFloatCell(fc, pageIdx, isEditing){
  const el = document.createElement('div');
  const shape = fc.shape || 'rect';
  el.className = 'fcell' + (fc.image ? ' has-img' : '') + ' shape-' + shape + (fc.locked ? ' locked' : '');
  el.id = 'fc-' + fc.id;
  el.style.cssText = 'left:'+fc.x+'px;top:'+fc.y+'px;width:'+fc.w+'px;height:'+fc.h+'px;z-index:'+(fc.z||15)+';';
  if(shape === 'rect') el.style.borderColor = fc.bc || '#000';

  // Hint icon (no image)
  const hint = document.createElement('div');
  hint.className = 'fcell-hint';
  hint.textContent = '🖼';
  el.appendChild(hint);

  // Size badge — always visible, updates dynamically on resize
  const sizeBadge = document.createElement('div');
  sizeBadge.id = 'fcsize-' + fc.id;
  sizeBadge.style.cssText = 'position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);color:#a8dde9;font-family:"Barlow Condensed",sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;padding:1px 5px;border-radius:10px;pointer-events:none;z-index:5;white-space:nowrap;';
  sizeBadge.textContent = Math.round(fc.w*2) + '×' + Math.round(fc.h*2) + 'px';
  el.appendChild(sizeBadge);

  // Image
  if(fc.image){
    const img = document.createElement('img');
    img.className = 'fimg';
    img.id = 'fimg-' + fc.id;
    img.src = fc.image;
    img.draggable = false;
    const p = fc.pan || {x:0,y:0,sc:1};
    const fox4=50+p.x/2; const foy4=50+p.y/2;
    img.style.objectPosition=fox4+'% '+foy4+'%';
    img.style.transform='scale('+p.sc+')';
    el.appendChild(img);
  }

  if(!isEditing) return el;

  // Controls bar (top)
  const ctrl = document.createElement('div');
  ctrl.className = 'fcell-ctrl';
  // Shape picker
  const shapes = [['rect','▭'],['circle','●'],['triangle','▲'],['hex','⬡'],['diamond','◆'],['splash','✸'],['star','★']];
  shapes.forEach(function(pair){
    const b = document.createElement('button');
    b.className = 'ecb' + (shape===pair[0]?' on':'');
    b.style.cssText = shape===pair[0]?'color:var(--a2);':'';
    b.title = pair[0];
    b.textContent = pair[1];
    b.onclick = (function(sh){ return function(e){ e.stopPropagation(); fc.shape=sh; addHist('Forma viñeta flotante'); renderBook(); scheduleSave(); }; })(pair[0]);
    ctrl.appendChild(b);
  });
  // Separator
  const sep = document.createElement('span');
  sep.style.cssText = 'width:1px;height:12px;background:var(--br);margin:0 2px;display:inline-block;';
  ctrl.appendChild(sep);
  // Border color
  const bcBtn = document.createElement('input');
  bcBtn.type = 'color';
  bcBtn.value = fc.bc || '#000000';
  bcBtn.style.cssText = 'width:16px;height:16px;border:none;padding:0;background:none;cursor:pointer;border-radius:50%;overflow:hidden;';
  bcBtn.title = 'Color borde';
  bcBtn.onchange = function(){ fc.bc=this.value; renderBook(); scheduleSave(); };
  ctrl.appendChild(bcBtn);
  // Border width
  const bwBtn = document.createElement('button');
  bwBtn.className = 'ecb';
  bwBtn.title = 'Grosor borde';
  bwBtn.textContent = '▣';
  bwBtn.onclick = function(e){
    e.stopPropagation();
    const sizes = [0,1,2,3,5,8];
    const cur = fc.bw !== undefined ? fc.bw : 2;
    const next = sizes[(sizes.indexOf(cur)+1) % sizes.length];
    fc.bw = next;
    el.style.borderWidth = next + 'px';
    scheduleSave();
  };
  ctrl.appendChild(bwBtn);
  // Z up/down
  const zUpBtn = document.createElement('button');
  zUpBtn.className = 'ecb'; zUpBtn.textContent = '↑'; zUpBtn.title = 'Traer al frente';
  zUpBtn.onclick = function(e){ e.stopPropagation(); fc.z=(fc.z||15)+1; el.style.zIndex=fc.z; scheduleSave(); };
  ctrl.appendChild(zUpBtn);
  const zDnBtn = document.createElement('button');
  zDnBtn.className = 'ecb'; zDnBtn.textContent = '↓'; zDnBtn.title = 'Enviar atrás';
  zDnBtn.onclick = function(e){ e.stopPropagation(); fc.z=Math.max(1,(fc.z||15)-1); el.style.zIndex=fc.z; scheduleSave(); };
  ctrl.appendChild(zDnBtn);
  // Duplicate group
  const dupB = document.createElement('button');
  dupB.className = 'ecb'; dupB.textContent = '⧉'; dupB.title = 'Duplicar (offset)';
  dupB.onclick = function(e){ e.stopPropagation(); dupFloatCell(fc, pageIdx); };
  ctrl.appendChild(dupB);
  const mhB = document.createElement('button');
  mhB.className = 'ecb'; mhB.textContent = '↔'; mhB.title = 'Espejo horizontal';
  mhB.onclick = function(e){ e.stopPropagation(); dupFloatCell(fc, pageIdx,'mirrorH'); };
  ctrl.appendChild(mhB);
  const mvB = document.createElement('button');
  mvB.className = 'ecb'; mvB.textContent = '↕'; mvB.title = 'Espejo vertical';
  mvB.onclick = function(e){ e.stopPropagation(); dupFloatCell(fc, pageIdx,'mirrorV'); };
  ctrl.appendChild(mvB);
  // Lock
  const lockB = document.createElement('button');
  lockB.className = 'ecb'; lockB.textContent = fc.locked ? '🔓' : '🔒'; lockB.title = 'Bloquear/Desbloquear';
  lockB.onclick = function(e){ e.stopPropagation(); fc.locked=!fc.locked; addHist('Viñeta flotante '+(fc.locked?'bloqueada':'desbloqueada')); renderBook(); scheduleSave(); };
  ctrl.appendChild(lockB);
  // Delete
  const delB = document.createElement('button');
  delB.className = 'ecb dl'; delB.textContent = '✕'; delB.title = 'Eliminar';
  delB.onclick = function(e){ e.stopPropagation(); delFloatCell(fc.id, pageIdx); };
  ctrl.appendChild(delB);
  el.appendChild(ctrl);

  // Image pan when image exists
  if(fc.image){
    // Pan drag
    el.addEventListener('mousedown', function(e){
      if(e.target.classList.contains('ecb') || e.target.classList.contains('fcell-inp') || e.target.classList.contains('rzh') || e.target.type==='color') return;
      e.stopPropagation();
      selFloatCell(el, fc, pageIdx);
      if(ST.tool === 'image'){
        // Pan mode
        const p2 = fc.pan || {x:0,y:0,sc:1};
        ST.fcPanDrag = {fc:fc, sx:e.clientX-p2.x, sy:e.clientY-p2.y};
      } else {
        startFloatDrag(e, fc, el, pageIdx);
      }
    });
    // Image controls popup
    const ipop = document.createElement('div');
    ipop.className = 'fcell-img-pop';
    const zIn=document.createElement('button');zIn.className='icp';zIn.textContent='＋';zIn.title='Zoom +';
    zIn.onclick=function(e){e.stopPropagation();if(!fc.pan)fc.pan={x:0,y:0,sc:1};fc.pan.sc=Math.min(5,fc.pan.sc+0.15);const img=document.getElementById('fimg-'+fc.id);if(img){const fox2=50+fc.pan.x/2;const foy2=50+fc.pan.y/2;img.style.objectPosition=fox2+'% '+foy2+'%';img.style.transform='scale('+fc.pan.sc+')';};scheduleSave();};
    const zOut=document.createElement('button');zOut.className='icp';zOut.textContent='－';zOut.title='Zoom -';
    zOut.onclick=function(e){e.stopPropagation();if(!fc.pan)fc.pan={x:0,y:0,sc:1};fc.pan.sc=Math.max(0.2,fc.pan.sc-0.15);const img=document.getElementById('fimg-'+fc.id);if(img){const fox3=50+fc.pan.x/2;const foy3=50+fc.pan.y/2;img.style.objectPosition=fox3+'% '+foy3+'%';img.style.transform='scale('+fc.pan.sc+')';};scheduleSave();};
    const rst=document.createElement('button');rst.className='icp';rst.textContent='↺';rst.title='Resetear';
    rst.onclick=function(e){e.stopPropagation();fc.pan={x:0,y:0,sc:1};const img=document.getElementById('fimg-'+fc.id);if(img){img.style.objectPosition='50% 50%';img.style.transform='scale(1)';};scheduleSave();};
    const rmv=document.createElement('button');rmv.className='icp';rmv.style.color='var(--ac)';rmv.textContent='✕ Img';
    rmv.onclick=function(e){e.stopPropagation();fc.image=null;fc.pan={x:0,y:0,sc:1};addHist('Img quitada');renderBook();scheduleSave();};
    ipop.appendChild(zIn);ipop.appendChild(zOut);ipop.appendChild(rst);ipop.appendChild(rmv);
    el.appendChild(ipop);
  } else {
    // File input to load image
    const finp = document.createElement('input');
    finp.type = 'file'; finp.accept = 'image/*'; finp.className = 'fcell-inp';
    finp.onchange = function(e){
      const f = e.target.files[0]; if(!f) return;
      const r = new FileReader();
      r.onload = function(ev){ fc.image=ev.target.result; fc.pan={x:0,y:0,sc:1}; addHist('Img viñeta flotante'); renderBook(); scheduleSave(); };
      r.readAsDataURL(f);
    };
    el.appendChild(finp);
    // Drag over
    el.addEventListener('dragover', function(e){ e.preventDefault(); el.style.opacity='0.7'; });
    el.addEventListener('dragleave', function(){ el.style.opacity=''; });
    el.addEventListener('drop', function(e){
      e.preventDefault(); el.style.opacity='';
      const f = e.dataTransfer.files[0];
      if(f && f.type.startsWith('image/')){
        const r = new FileReader();
        r.onload = function(ev){ fc.image=ev.target.result; fc.pan={x:0,y:0,sc:1}; addHist('Img viñeta flotante'); renderBook(); scheduleSave(); };
        r.readAsDataURL(f);
      }
    });
    // Drag to move (no image)
    el.addEventListener('mousedown', function(e){
      if(e.target.classList.contains('ecb') || e.target.classList.contains('fcell-inp') || e.target.type==='color') return;
      e.stopPropagation();
      selFloatCell(el, fc, pageIdx);
      startFloatDrag(e, fc, el, pageIdx);
    });
  }

  // Resize handles
  const rzw = document.createElement('div'); rzw.className = 'rzw';
  ['tl','tr','bl','br'].forEach(function(corner){
    const h = document.createElement('div'); h.className = 'rzh ' + corner;
    h.addEventListener('mousedown', function(e){
      e.stopPropagation(); e.preventDefault();
      ST.drag = {mode:'resize', obj:fc, el:el, corner:corner, sx:e.clientX, sy:e.clientY, ow:fc.w, oh:fc.h};
    });
    rzw.appendChild(h);
  });
  el.appendChild(rzw);

  return el;
}

function selFloatCell(el, fc, pageIdx){
  deselAll(true);
  el.classList.add('sel');
  ST.selEl = el;
  ST.selFC = {fc:fc, pageIdx:pageIdx};
  // Show float cell properties in image panel
  if(ST.tool==='image')renderLP();
  else{setTool('image');}
}

function startFloatDrag(e, fc, el, pageIdx){
  const inner = document.getElementById('inner-'+pageIdx) || el.closest('.cover-wrap,.back-wrap');
  if(!inner) return;
  const pr = inner.getBoundingClientRect();
  const z = ST.zoom || 1;
  ST.drag = {mode:'drag', obj:fc, el:el, ox:(e.clientX-pr.left)/z - fc.x, oy:(e.clientY-pr.top)/z - fc.y, pageIdx:pageIdx, z:z};
  e.preventDefault();
}

function dupFloatCell(fc, pageIdx, mode){
  const page = proj.pages[pageIdx]; if(!page) return;
  if(!page.floatCells) page.floatCells = [];
  const copy = JSON.parse(JSON.stringify(fc));
  copy.id = Date.now();
  // Get page width to calculate mirror position
  const inner = document.getElementById('inner-'+pageIdx);
  const pw = inner ? inner.offsetWidth/(ST.zoom||1) : 360;
  const ph = inner ? inner.offsetHeight/(ST.zoom||1) : 480;
  if(mode==='mirrorH'){
    // Mirror horizontally: flip X across page center
    copy.x = pw - fc.x - fc.w;
  } else if(mode==='mirrorV'){
    // Mirror vertically: flip Y across page center
    copy.y = ph - fc.y - fc.h;
  } else if(mode==='mirrorBoth'){
    copy.x = pw - fc.x - fc.w;
    copy.y = ph - fc.y - fc.h;
  } else {
    // Default: offset copy
    copy.x = (fc.x||0)+14; copy.y = (fc.y||0)+14;
  }
  page.floatCells.push(copy);
  addHist('Viñeta flotante duplicada'); renderBook(); scheduleSave();
}

function delFloatCell(id, pageIdx){
  const page = proj.pages[pageIdx]; if(!page) return;
  page.floatCells = (page.floatCells||[]).filter(function(fc){ return fc.id !== id; });
  addHist('Viñeta flotante eliminada'); renderBook(); renderLP(); scheduleSave();
}

function addFloatCell(shape){
  const page = apg(); if(!page) return;
  if(!page.floatCells) page.floatCells = [];
  const fc = {
    id: Date.now(),
    x: 40 + page.floatCells.length * 14,
    y: 40 + page.floatCells.length * 14,
    w: 120, h: 120,
    shape: shape || 'rect',
    image: null, pan: {x:0,y:0,sc:1},
    bc: '#000', bw: 2, z: 15 + page.floatCells.length,
    locked: false
  };
  page.floatCells.push(fc);
  addHist('Viñeta flotante añadida'); renderBook(); scheduleSave();
}


// ── COVER ──
function renderCover(container,page,pageIdx){
  const w=document.createElement('div');w.className='cover-wrap';
  const isEditing=ST.editPage===pageIdx;

  if(page.coverImg){
    const img=document.createElement('img');img.className='cover-bg';
    img.src=page.coverImg;
    const p=page.coverPan||{x:0,y:0,sc:1};
    img.style.transform=`translate(${p.x}px,${p.y}px) scale(${p.sc})`;
    img.id='coverBgImg';
    w.appendChild(img);

    // Pan drag on cover image
    if(isEditing&&ST.tool==='image'){
      w.style.cursor='grab';
      w.addEventListener('mousedown',e=>{
        if(e.target.classList.contains('icp')||e.target.closest('.freetxt')||e.target.classList.contains('ecb')||e.target.classList.contains('cover-finp')||e.target.closest('.el-ctrl'))return;
        e.preventDefault();
        // Prevent pan starting on freetxt/fcell or their children
        if(e.target.closest&&(e.target.closest('.freetxt')||e.target.closest('.fcell')||e.target.closest('.el-ctrl')))return;
        // Clear float cell selection
        if(ST.selFC){ST.selFC=null;if(ST.tool==='image')renderLP();}
        const z2=ST.zoom||1;ST.coverPanDrag={sx:e.clientX/z2-(p.x),sy:e.clientY/z2-(p.y)};
      });
    }

    // Image controls popup
    const pop=document.createElement('div');pop.className='cover-img-pop';
    pop.innerHTML=`<button class="icp" onclick="coverZoom(event,.15)">＋</button><button class="icp" onclick="coverZoom(event,-.15)">－</button><button class="icp" onclick="resetCoverPan(event)">↺</button><button class="icp" style="color:var(--ac)" onclick="delCoverImg(event,${pageIdx})">✕ Quitar</button>`;
    w.appendChild(pop);
  } else {
    const hint=document.createElement('div');hint.className='cover-hint';
    hint.innerHTML='<div class="cover-hint-icon">🖼</div><div class="cover-hint-txt">Click para imagen de portada</div>';
    w.appendChild(hint);
    if(isEditing){
      const finp=document.createElement('input');finp.type='file';finp.accept='image/*';finp.className='cover-finp';
      finp.onchange=e=>loadCoverImg(e,page,pageIdx);
      w.appendChild(finp);
    }
  }

  // Float cells on cover
  (page.floatCells||[]).forEach(function(fc){ w.appendChild(mkFloatCell(fc,pageIdx,isEditing)); });
  // Draggable elements (texts, sfx) on cover
  (page.texts||[]).forEach(t=>w.appendChild(mkFreeTxt(t,pageIdx)));
  (page.sfx||[]).forEach(s=>w.appendChild(mkSfxEl(s,pageIdx)));

  // Overlay for non-editing
  if(!isEditing){
    const ov=document.createElement('div');ov.className='pov';ov.innerHTML='<span>EDITAR PORTADA</span>';
    ov.onclick=()=>{ST.editPage=pageIdx;renderBook();renderLP();};
    w.appendChild(ov);
  }

  container.appendChild(w);
}

function loadCoverImg(e,page,pageIdx){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{page.coverImg=ev.target.result;page.coverPan={x:0,y:0,sc:1};addHist('Portada imagen');renderBook();renderThumbStrip();scheduleSave();};
  r.readAsDataURL(f);
}
function coverZoom(e,d){
  e.stopPropagation();
  const page=proj.pages.find(p=>p.type==='cover');if(!page)return;
  if(!page.coverPan)page.coverPan={x:0,y:0,sc:1};
  page.coverPan.sc=Math.max(.2,Math.min(5,page.coverPan.sc+d));
  const img=document.getElementById('coverBgImg');
  if(img)img.style.transform=`translate(${page.coverPan.x}px,${page.coverPan.y}px) scale(${page.coverPan.sc})`;
  scheduleSave();
}
function resetCoverPan(e){
  e.stopPropagation();
  const page=proj.pages.find(p=>p.type==='cover');if(!page)return;
  page.coverPan={x:0,y:0,sc:1};
  const img=document.getElementById('coverBgImg');
  if(img)img.style.transform='translate(0px,0px) scale(1)';
  scheduleSave();
}
function delCoverImg(e,pageIdx){
  e.stopPropagation();
  proj.pages[pageIdx].coverImg=null;proj.pages[pageIdx].coverPan={x:0,y:0,sc:1};
  addHist('Portada imagen quitada');renderBook();renderThumbStrip();scheduleSave();
}

function renderInner(container,page,pageIdx){

  let ci=0;

    const rowEl=document.createElement('div');rowEl.className='bpanel';

          const v=document.createElement('div');v.className='cg v';v.style.left=pct+'%';cell.appendChild(v);
        });
      });
    },0);

      deselAll();

    }
  });

    ov.onclick=()=>{ST.editPage=pageIdx;renderBook();renderLP();};

// ── CELL ──
function liftCellToFloat(page,pageIdx,idx,mouseEvent){
  // Get the cell's current DOM position relative to the page
  const cellEl=document.getElementById('cell-'+pageIdx+'-'+idx);
  const inner=document.getElementById('inner-'+pageIdx);
  if(!cellEl||!inner){return;}
  const cRect=cellEl.getBoundingClientRect();
  const iRect=inner.getBoundingClientRect();
  const z=ST.zoom||1;
  // Position in page coordinates
  const fx=(cRect.left-iRect.left)/z;
  const fy=(cRect.top-iRect.top)/z;
  const fw=cRect.width/z;
  const fh=cRect.height/z;
  // Create float cell with same image and pan
  if(!page.floatCells)page.floatCells=[];
  const fc={
    id:Date.now(),
    x:fx, y:fy, w:fw, h:fh,
    shape:page.cellShape||'rect',
    image:page.images[idx],
    pan:page.pans&&page.pans[idx]?JSON.parse(JSON.stringify(page.pans[idx])):{x:0,y:0,sc:1},
    bc:page.bc||'#000', bw:page.bw||2,
    z:20+page.floatCells.length
  };
  page.floatCells.push(fc);
  // Remove image from grid cell
  delete page.images[idx];
  if(page.pans)delete page.pans[idx];
  // Re-render to create the float cell DOM element
  addHist('Viñeta despegada');
  renderBook();
  scheduleSave();
  // Immediately start dragging the new float cell
  requestAnimationFrame(()=>{
    const newEl=document.getElementById('fc-'+fc.id);
    const innerEl=document.getElementById('inner-'+pageIdx);
    if(!newEl||!innerEl)return;
    const pr=innerEl.getBoundingClientRect();
    const z2=ST.zoom||1;
    ST.drag={mode:'drag',obj:fc,el:newEl,
      ox:(mouseEvent.clientX-pr.left)/z2-fc.x,
      oy:(mouseEvent.clientY-pr.top)/z2-fc.y,
      pageIdx:pageIdx,z:z2};
    newEl.classList.add('sel');
    ST.selEl=newEl;
    ST.selFC={fc:fc,pageIdx:pageIdx};
  });
}

function mkCell(page,pageIdx,idx,diag,bw,flex,isEditing,isH,gap,totalCols,colIdx){
  const cell=document.createElement('div');
  const hasImg=page.images&&page.images[idx];
  const shapeClass=(page.cellShape&&page.cellShape!=='rect')?' shape-'+page.cellShape:'';
  const gridClass=page.gridBg&&!hasImg?' grid-bg':'';
  cell.className='bcell'+(hasImg?' has-img':'')+(diag==='r'?' diag-r':diag==='l'?' diag-l':'')+(page.bleedCells&&page.bleedCells[idx]?' bleed':'')+shapeClass+gridClass;
  cell.style.borderWidth=bw+'px';
  cell.style.borderColor=page.bc||'#000';
  cell.style.borderStyle=bw===0?'none':'solid';
  cell.style.flex=flex;
  cell.id=`cell-${pageIdx}-${idx}`;

  // Cell num badge
  const num=document.createElement('div');num.className='cell-num';num.textContent=idx+1;cell.appendChild(num);

  const pan=(page.pans&&page.pans[idx])||{x:0,y:0,sc:1};


  if(hasImg){
    const img=document.createElement('img');img.className='cp';
    img.id=`ci-${pageIdx}-${idx}`;img.src=page.images[idx];img.draggable=false;
    // Use object-position for pan (avoids clipping), transform only for scale
    const ox2=50+(pan.x||0)/2; const oy2=50+(pan.y||0)/2;
    img.style.objectPosition=ox2+'% '+oy2+'%';
    img.style.transform='scale('+(pan.sc||1)+')';
    cell.appendChild(img);

    if(isEditing&&ST.tool==='image'){
      cell.style.cursor='grab';
      cell.addEventListener('mousedown',e=>{
        // Ignore clicks on controls, resize handles, or the file input
        if(e.target.classList.contains('icp')||
           e.target.classList.contains('crh')||
           e.target.classList.contains('crv')||
           e.target.classList.contains('cell-inp')||
           e.target.type==='file')return;
        e.preventDefault();e.stopPropagation();
        const startX=e.clientX, startY=e.clientY;
        let decided=false;
        const onMove=mv=>{
          if(decided)return;
          const dx=mv.clientX-startX, dy=mv.clientY-startY;
          // Higher threshold (25px) + require Alt key for lift-to-float
          // This prevents accidental lift when panning
          if(Math.sqrt(dx*dx+dy*dy)<25)return;
          decided=true;
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
          // Only lift if Alt is held — otherwise just pan
          if(e.altKey){
            liftCellToFloat(page,pageIdx,idx,mv);
          } else {
            // Regular pan
            ST.panDrag={pageIdx,idx,sx:startX-(pan.x||0),sy:startY-(pan.y||0)};
          }
        };
        const onUp=()=>{
          if(!decided){
            document.removeEventListener('mousemove',onMove);
            document.removeEventListener('mouseup',onUp);
            // Click (no drag) → pan mode starts
            ST.panDrag={pageIdx,idx,sx:startX-(pan.x||0),sy:startY-(pan.y||0)};
          }
          decided=true;
        };
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp);
      });
    }

    const pop=document.createElement('div');pop.className='img-pop';
    pop.innerHTML=`<button class="icp" onclick="cellZoom(event,${pageIdx},${idx},.15)">＋</button><button class="icp" onclick="cellZoom(event,${pageIdx},${idx},-.15)">－</button><button class="icp" onclick="resetPan(event,${pageIdx},${idx})">↺</button><button class="icp" style="color:var(--ac)" onclick="delCellImg(event,${pageIdx},${idx})">✕</button>`;
    cell.appendChild(pop);
  } else {
    // Hint with size
    const hint=document.createElement('div');hint.className='bcell-hint';
    hint.innerHTML=`<div class="hint-icon">🖼</div><div class="hint-txt">Foto</div><div class="hint-size" id="csz-${pageIdx}-${idx}">calculando...</div>`;
    cell.appendChild(hint);
    // Empty cell also gets a delete option on hover
    const epop=document.createElement('div');epop.className='img-pop';
    epop.innerHTML=`<button class="icp" style="color:var(--ac)" onclick="delCell(event,${pageIdx},${idx})" title="Eliminar viñeta">🗑 Eliminar viñeta</button>`;
    cell.appendChild(epop);
    // Compute size after render
    requestAnimationFrame(()=>{
      const el=document.getElementById(`cell-${pageIdx}-${idx}`);
      const szEl=document.getElementById(`csz-${pageIdx}-${idx}`);
      if(el&&szEl){
        // Divide by zoom so reported size is the true page-space size
        const z=ST.zoom||1;
        const w=Math.round((el.offsetWidth/z)*2);
        const h=Math.round((el.offsetHeight/z)*2);
        szEl.textContent=`${w}×${h}px`;
      }
    });

    if(isEditing&&ST.tool==='image'){
      const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.className='cell-inp';
      inp.onchange=e=>loadFileIntoCell(e.target.files[0],page,pageIdx,idx);
      inp.addEventListener('mousedown',e=>e.stopPropagation()); // prevent lift-to-float
      cell.appendChild(inp);
      cell.addEventListener('dragover',e=>{e.preventDefault();cell.style.borderColor='var(--a2)';});
      cell.addEventListener('dragleave',()=>cell.style.borderColor=page.bc||'#000');
      cell.addEventListener('drop',e=>{e.preventDefault();cell.style.borderColor='';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))loadFileIntoCell(f,page,pageIdx,idx);});
    }
  }

  // Draw canvas — lazy init when dimensions are known
  const drawKey=`${pageIdx}-${idx}`;
  const dcv=document.createElement('canvas');dcv.className='dcv';dcv.id=`dcv-${drawKey}`;
  cell.appendChild(dcv);
  // Restore drawing after layout
  requestAnimationFrame(()=>{
    const el=document.getElementById(`cell-${pageIdx}-${idx}`);
    if(!el)return;
    dcv.width=el.offsetWidth||150;dcv.height=el.offsetHeight||200;
    if(page.draws&&page.draws[drawKey]){
      const tmp=new Image();tmp.onload=()=>{const ctx=dcv.getContext('2d');ctx.drawImage(tmp,0,0,dcv.width,dcv.height);};tmp.src=page.draws[drawKey];
    }
    // Activate drawing if this is the selected draw cell
    if(isEditing&&ST.tool==='draw'&&ST.drawCell===idx){
      dcv.classList.add('active');
      let painting=false;
      dcv.addEventListener('mousedown',e=>{
        if(e.button!==0)return;
        e.stopPropagation();painting=true;
        const ctx=dcv.getContext('2d');const rect=dcv.getBoundingClientRect();
        const sx=dcv.width/rect.width;const sy=dcv.height/rect.height;
        ctx.beginPath();ctx.moveTo((e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy);
      });
      dcv.addEventListener('mousemove',e=>{
        if(!painting)return;
        const ctx=dcv.getContext('2d');const rect=dcv.getBoundingClientRect();
        const sx=dcv.width/rect.width;const sy=dcv.height/rect.height;
        ctx.lineTo((e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy);
        if(ST.drawMode==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';}
        else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=ST.drawColor;}
        ctx.lineWidth=ST.drawMode==='eraser'?ST.drawSize*3:ST.drawSize;
        ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
      });
      const stopDraw=()=>{if(painting){painting=false;if(!page.draws)page.draws={};page.draws[drawKey]=dcv.toDataURL();scheduleSave();}};
      dcv.addEventListener('mouseup',stopDraw);dcv.addEventListener('mouseleave',stopDraw);
    }
  });

  // Cell resize handle (between siblings, not on last)
  if(isEditing&&colIdx<totalCols-1){
    const rh=document.createElement('div');rh.className=isH?'crv':'crh';
    rh.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const ni=idx+1;
      ST.cellResize={pageIdx,idx,ni,isH,sx:e.clientX,sy:e.clientY,
        sf:Number((page.flexes&&page.flexes[idx])||1),
        nf:Number((page.flexes&&page.flexes[ni])||1)};
      rh.classList.add('drag');
    });
    cell.appendChild(rh);
  }

  return cell;
}

function loadFileIntoCell(f,page,pageIdx,idx){
  if(!f)return;const r=new FileReader();
  r.onload=ev=>{if(!page.images)page.images={};if(!page.pans)page.pans={};
    page.images[idx]=ev.target.result;page.pans[idx]={x:0,y:0,sc:1};
    addHist(`Img viñeta ${idx+1}`);renderBook();scheduleSave();};
  r.readAsDataURL(f);
}
function cellZoom(e,pi,idx,d){
  e.stopPropagation();const pg=proj.pages[pi];if(!pg.pans)pg.pans={};
  if(!pg.pans[idx])pg.pans[idx]={x:0,y:0,sc:1};
  pg.pans[idx].sc=Math.max(.2,Math.min(5,(pg.pans[idx].sc||1)+d));
  const img=document.getElementById(`ci-${pi}-${idx}`);
  if(img){const ox3=50+(pg.pans[idx].x||0)/2;const oy3=50+(pg.pans[idx].y||0)/2;img.style.objectPosition=ox3+'% '+oy3+'%';img.style.transform='scale('+pg.pans[idx].sc+')';}
  scheduleSave();
}
function resetPan(e,pi,idx){
  e.stopPropagation();const pg=proj.pages[pi];if(!pg.pans)pg.pans={};
  pg.pans[idx]={x:0,y:0,sc:1};
  const img=document.getElementById(`ci-${pi}-${idx}`);
  if(img){img.style.objectPosition='50% 50%';img.style.transform='scale(1)';}scheduleSave();
}
function delCellImg(e,pi,idx){
  e.stopPropagation();const pg=proj.pages[pi];
  if(pg.images)delete pg.images[idx];if(pg.pans)delete pg.pans[idx];
  addHist('Img quitada');renderBook();scheduleSave();
}
function delCell(e,pi,idx){
  e.stopPropagation();
  const pg=proj.pages[pi];if(!pg||pg.type!=='inner')return;
  const tpl=gTpl(pg.tpl,pg);
  const totalCells=tpl.rows.reduce((s,r)=>s+r.c,0);
  if(totalCells<=1){alert('No se puede eliminar la única viñeta. Cambiá la plantilla primero.');return;}
  // Find which row and col this idx belongs to, reduce that row's count
  // Strategy: rebuild flexes/images/pans removing that index and shifting down
  const newImages={};const newPans={};const newFlexes={};const newDraws={};
  let newIdx=0;
  for(let i=0;i<totalCells;i++){
    if(i===idx)continue;
    if(pg.images&&pg.images[i])newImages[newIdx]=pg.images[i];
    if(pg.pans&&pg.pans[i])newPans[newIdx]=pg.pans[i];
    const drawKey=`${pi}-${i}`;const newDrawKey=`${pi}-${newIdx}`;
    if(pg.draws&&pg.draws[drawKey])newDraws[newDrawKey]=pg.draws[drawKey];
    if(pg.flexes&&pg.flexes[i])newFlexes[newIdx]=pg.flexes[i];
    newIdx++;
  }
  // Find the row containing idx and reduce its col count
  let ci=0;let found=false;
  for(let r=0;r<tpl.rows.length;r++){
    const row=tpl.rows[r];
    for(let col=0;col<row.c;col++){
      if(ci===idx){
        if(row.c>1){row.c--;}
        else{tpl.rows.splice(r,1);}
        found=true;break;
      }
      ci++;
    }
    if(found)break;
  }
  // Save modified template as custom override on page
  pg.customRows=JSON.parse(JSON.stringify(tpl.rows));
  pg.tpl='custom';
  pg.images=newImages;pg.pans=newPans;pg.flexes=newFlexes;pg.draws=newDraws;
  addHist('Viñeta eliminada');renderBook();renderLP();scheduleSave();
}

// ══════════════════════════════════════════
// BUBBLE — with proper SVG tail
// ══════════════════════════════════════════
function mkBub(b,pageIdx,isEditing){
  const wrap=document.createElement('div');
  wrap.className=`bub btype-${b.type}`+(b.locked?' locked':'');
  wrap.id=`bub-${b.id}`;
  const w=Number(b.w||100);const h=Number(b.h||60);
  wrap.style.cssText=`left:${b.x}px;top:${b.y}px;width:${w}px;height:${h}px;`;

  const ctrl=document.createElement('div');ctrl.className='el-ctrl';
  ctrl.innerHTML=`<button class="ecb" onclick="selectBubToEdit(${b.id},${pageIdx})">✏️</button>
    <button class="ecb" onclick="dupEl('bub',${b.id},${pageIdx})">⧉</button>
    <button class="ecb" onclick="lockEl('bub',${b.id},${pageIdx})">${b.locked?'🔓':'🔒'}</button>
    <button class="ecb dl" onclick="delBub(${b.id},${pageIdx})">✕</button>`;

  const bi=document.createElement('div');bi.className='bi';
  // Font scales with height (Canva-style)
  const fs=b.fontSize?Number(b.fontSize):Math.max(11,Math.round(h*0.26));bi.style.cssText='font-family:'+b.font+';font-size:'+fs+'px;font-weight:900;color:'+b.tc+';opacity:1;-webkit-text-stroke:'+(b.sc&&b.sc!==b.tc?'1px '+b.sc:'none')+';text-shadow:none;background:'+b.bgc+';border-color:'+b.brc+';letter-spacing:0.5px;-webkit-font-smoothing:antialiased;';
  bi.textContent=b.text;
  if(isEditing&&!b.locked){
    bi.addEventListener('dblclick',e=>{e.stopPropagation();editBubText(b.id,pageIdx);});
  }

  // Tail SVG — drawn relative to wrap coords
  const tailAngle=b.tailAngle!==undefined?b.tailAngle:225;
  const tailLen=Number(b.tailLen||28);
  const ra=(tailAngle*Math.PI)/180;
  // Origin point on bubble edge
  const cx=w/2; const cy=h/2;
  // Point on edge: approx ellipse
  const ex_norm=Math.cos(ra); const ey_norm=Math.sin(ra);
  const edgeX=cx+ex_norm*(w*0.42);
  const edgeY=cy+ey_norm*(h*0.42);
  // Tip of tail
  const tipX=edgeX+ex_norm*tailLen;
  const tipY=edgeY+ey_norm*tailLen;
  // Perpendicular for tail width
  const pr=tailAngle+90; const pra=(pr*Math.PI)/180;
  const tw=6;
  const p1x=edgeX+Math.cos(pra)*tw; const p1y=edgeY+Math.sin(pra)*tw;
  const p2x=edgeX-Math.cos(pra)*tw; const p2y=edgeY-Math.sin(pra)*tw;

  if(b.type!=='narrator'&&b.type!=='shout'){
    const svgNS='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(svgNS,'svg');
    // z-index:0 puts SVG BEHIND the .bi div so the bubble border covers the tail base
    svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:0;';
    svg.setAttribute('width',w);svg.setAttribute('height',h);
    svg.id=`tail-svg-${b.id}`;

    // Extend base points slightly inside the bubble so tail blends seamlessly
    const inset=3;
    const p1xi=p1x-Math.cos(pra)*inset; const p1yi=p1y-Math.sin(pra)*inset;
    const p2xi=p2x+Math.cos(pra)*inset; const p2yi=p2y+Math.sin(pra)*inset;

    // Fill polygon — same color as bubble background, NO stroke
    const polyFill=document.createElementNS(svgNS,'polygon');
    polyFill.setAttribute('points',`${p1xi},${p1yi} ${p2xi},${p2yi} ${tipX},${tipY}`);
    polyFill.setAttribute('fill',b.bgc||'#fff');
    polyFill.setAttribute('stroke','none');
    svg.appendChild(polyFill);

    // Outline — only the two outer edges (not the base), matching bubble border color
    const outline=document.createElementNS(svgNS,'polyline');
    outline.setAttribute('points',`${p1xi},${p1yi} ${tipX},${tipY} ${p2xi},${p2yi}`);
    outline.setAttribute('fill','none');
    outline.setAttribute('stroke',b.brc||'#000');
    outline.setAttribute('stroke-width','2');
    outline.setAttribute('stroke-linejoin','round');
    outline.setAttribute('stroke-linecap','round');
    svg.appendChild(outline);

    wrap.appendChild(svg);

    // Tail handle — at tip position
    if(isEditing&&!b.locked){
      const th=document.createElement('div');th.className='tail-h';
      th.style.cssText=`left:${tipX}px;top:${tipY}px;`;
      th.addEventListener('mousedown',e=>{
        e.stopPropagation();e.preventDefault();
        const inner=document.getElementById(`inner-${pageIdx}`);if(!inner)return;
        const pr2=inner.getBoundingClientRect();
        const bcx=b.x+cx; const bcy=b.y+cy;
        const z=ST.zoom||1;

        const onMove=ev=>{
          // Compensate for zoom
          const relX=(ev.clientX-pr2.left)/z-bcx;
          const relY=(ev.clientY-pr2.top)/z-bcy;
          b.tailAngle=((Math.atan2(relY,relX)*180/Math.PI)+360)%360;
          const dist=Math.sqrt(relX*relX+relY*relY);
          b.tailLen=Math.max(10,Math.min(80,dist-Math.max(w*0.42,h*0.42)));

          // Update SVG inline — no full re-render
          updateTailSVG(b,w,h);
          // Move handle to new tip position
          const ra3=(b.tailAngle*Math.PI)/180;
          const ex3=cx+Math.cos(ra3)*(w*0.42);
          const ey3=cy+Math.sin(ra3)*(h*0.42);
          const tX=ex3+Math.cos(ra3)*b.tailLen;
          const tY=ey3+Math.sin(ra3)*b.tailLen;
          th.style.left=tX+'px';th.style.top=tY+'px';
        };
        const onUp=()=>{
          document.removeEventListener('mousemove',onMove);
          document.removeEventListener('mouseup',onUp);
          scheduleSave();
        };
        document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
      });
      wrap.appendChild(th);
    }
  }

  // Resize handles
  const rzw=document.createElement('div');rzw.className='rzw';
  ['tl','tr','bl','br'].forEach(corner=>{
    const h2=document.createElement('div');h2.className=`rzh ${corner}`;
    h2.addEventListener('mousedown',e=>{
      e.stopPropagation();e.preventDefault();
      ST.drag={mode:'resize',obj:b,el:wrap,corner,sx:e.clientX,sy:e.clientY,ow:w,oh:h};
    });
    rzw.appendChild(h2);
  });

  wrap.appendChild(ctrl);wrap.appendChild(bi);wrap.appendChild(rzw);

  if(isEditing&&!b.locked){
    wrap.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rzh')||e.target.classList.contains('ecb')||e.target.classList.contains('tail-h'))return;
      e.stopPropagation();
      const prevSelBub=ST.selBub;
      selEl(wrap);ST.selBub={b,pageIdx};
      // Only re-render panel if selection actually changed (not on every drag start)
      if(ST.tool==='bubble'&&(!prevSelBub||prevSelBub.b.id!==b.id))renderLP();
      startDrag(e,b,wrap,pageIdx);
    });
  }
  return wrap;
}

function updateTailSVG(b,w,h){
  const svg=document.getElementById('tail-svg-'+b.id);if(!svg)return;
  const ta=b.tailAngle!==undefined?b.tailAngle:225;
  const tl=Number(b.tailLen||28);
  const ra=(ta*Math.PI)/180;
  const cx=w/2;const cy=h/2;
  const ex=cx+Math.cos(ra)*(w*0.42);
  const ey=cy+Math.sin(ra)*(h*0.42);
  const tipX=ex+Math.cos(ra)*tl;
  const tipY=ey+Math.sin(ra)*tl;
  const pr=(ta+90)*Math.PI/180;
  const tw=6;const inset=3;
  const p1x=ex+Math.cos(pr)*tw; const p1y=ey+Math.sin(pr)*tw;
  const p2x=ex-Math.cos(pr)*tw; const p2y=ey-Math.sin(pr)*tw;
  const p1xi=p1x-Math.cos(pr)*inset; const p1yi=p1y-Math.sin(pr)*inset;
  const p2xi=p2x+Math.cos(pr)*inset; const p2yi=p2y+Math.sin(pr)*inset;
  const polys=svg.querySelectorAll('polygon,polyline');
  if(polys[0])polys[0].setAttribute('points',p1xi+','+p1yi+' '+p2xi+','+p2yi+' '+tipX+','+tipY);
  if(polys[1])polys[1].setAttribute('points',p1xi+','+p1yi+' '+tipX+','+tipY+' '+p2xi+','+p2yi);
  svg.setAttribute('width',w);svg.setAttribute('height',h);
  if(polys[0])polys[0].setAttribute('fill',b.bgc||'#fff');
  if(polys[1])polys[1].setAttribute('stroke',b.brc||'#000');
  // Also reposition the tail handle
  const th=document.getElementById('tail-h-'+b.id);
  if(th){th.style.left=tipX+'px';th.style.top=tipY+'px';}
}

function editBubText(id,pageIdx){

function delBub(id,pageIdx){

  deselAll(true);addHist('Globo eliminado');renderBook();renderLP();renderThumbStrip();scheduleSave();

// ══════════════════════════════════════════
// FREE TEXT
// ══════════════════════════════════════════
function mkFreeTxt(t,pageIdx){
  const isEditing=ST.editPage===pageIdx;
  const el=document.createElement('div');
  el.className='freetxt'+(t.locked?' locked':'');el.id=`ft-${t.id}`;
  el.style.cssText=`left:${t.x}px;top:${t.y}px;width:${t.w||120}px;`;

  const ctrl=document.createElement('div');ctrl.className='el-ctrl';
  ctrl.innerHTML=`<button class="ecb" onclick="dupEl('txt',${t.id},${pageIdx})">⧉</button><button class="ecb" onclick="lockEl('txt',${t.id},${pageIdx})">${t.locked?'🔓':'🔒'}</button><button class="ecb dl" onclick="delTxt(${t.id},${pageIdx})">✕</button>`;

  const inner=document.createElement('div');inner.className='ft-in';
  const strokeCss=t.strokeVal&&t.strokeVal!=='none'?'-webkit-text-stroke:'+t.strokeVal+';paint-order:stroke fill;':'';
  inner.style.cssText='font-family:'+t.font+';font-size:'+t.size+'px;color:'+t.color+';font-weight:'+(t.weight||700)+';text-shadow:'+(t.shadow||'none')+';'+strokeCss+'letter-spacing:'+(t.ls||0)+'px;line-height:'+(t.lh||1.4)+';text-align:'+(t.align||'left')+';cursor:move;';
  inner.textContent=t.text;
  // contentEditable starts OFF — only activates on dblclick
  inner.contentEditable='false';

  const rzw=document.createElement('div');rzw.className='rzw';
  ['tl','tr','bl','br'].forEach(corner=>{
    const h=document.createElement('div');h.className=`rzh ${corner}`;
    h.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();ST.drag={mode:'resize',obj:t,el,corner,sx:e.clientX,sy:e.clientY,ow:t.w||120,oh:t.h||40};});
    rzw.appendChild(h);
  });

  el.appendChild(ctrl);el.appendChild(inner);el.appendChild(rzw);

  if(isEditing&&!t.locked){
    // Single click anywhere on element → select + drag
    el.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('rzh')||e.target.classList.contains('ecb'))return;
      // If already in edit mode, let the browser handle cursor positioning
      if(inner.contentEditable==='true')return;
      e.preventDefault();
      e.stopPropagation();
      selEl(el);
      startDrag(e,t,el,pageIdx);
    });

    // Double click → activate text editing
    el.addEventListener('dblclick',e=>{
      if(e.target.classList.contains('ecb'))return;
      e.stopPropagation();
      inner.contentEditable='true';
      inner.style.cursor='text';
      el.style.cursor='text';
      inner.focus();
      // Place cursor at click position
      const range=document.caretRangeFromPoint?document.caretRangeFromPoint(e.clientX,e.clientY):null;
      if(range){const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);}
    });

    // On blur → save text, exit edit mode
    inner.addEventListener('blur',()=>{
      t.text=inner.textContent;
      inner.contentEditable='false';
      inner.style.cursor='move';
      el.style.cursor='move';
      scheduleSave();
    });

    // Escape key → exit edit mode without moving
    inner.addEventListener('keydown',e=>{
      if(e.key==='Escape'){inner.blur();}
    });
  }
  return el;
}
function delTxt(id,pageIdx){
  const page=proj.pages[pageIdx];if(!page)return;
  page.texts=(page.texts||[]).filter(t=>t.id!==id);
  deselAll(true);addHist('Texto eliminado');renderBook();renderLP();renderThumbStrip();scheduleSave();
}

// ══════════════════════════════════════════
// ELEMENT ACTIONS
// ══════════════════════════════════════════
function dupEl(type,id,pageIdx){
  const page=proj.pages[pageIdx];if(!page)return;
  const arr=type==='bub'?(page.bubbles||[]):type==='sfx'?(page.sfx||[]):(page.texts||[]);
  const orig=arr.find(e=>e.id===Number(id)||e.id===id);if(!orig)return;
  const copy=JSON.parse(JSON.stringify(orig));
  copy.id=Date.now();copy.x=(copy.x||0)+14;copy.y=(copy.y||0)+14;
  arr.push(copy);addHist('Duplicado');renderBook();renderLP();scheduleSave();
}
function lockEl(type,id,pageIdx){
  const page=proj.pages[pageIdx];if(!page)return;
  const arr=type==='bub'?(page.bubbles||[]):type==='sfx'?(page.sfx||[]):(page.texts||[]);
  const el=arr.find(e=>e.id===Number(id)||e.id===id);if(!el)return;
  el.locked=!el.locked;addHist(el.locked?'Bloqueado':'Desbloqueado');renderBook();renderLP();renderThumbStrip();scheduleSave();
}

// ══════════════════════════════════════════
// DRAG / RESIZE / PAN
// ══════════════════════════════════════════
function startDrag(e,obj,el,pageIdx){
  const inner=document.getElementById(`inner-${pageIdx}`)||el.closest('.cover-wrap,.back-wrap');
  if(!inner)return;
  const pr=inner.getBoundingClientRect();
  const z=ST.zoom||1;
  // getBoundingClientRect already includes CSS transform scale,
  // so we need to divide the offset by zoom to get page-space coords
  ST.drag={mode:'drag',obj,el,ox:(e.clientX-pr.left)/z-obj.x,oy:(e.clientY-pr.top)/z-obj.y,pageIdx,z};
  e.preventDefault();
}

document.addEventListener('mousemove',e=>{
  // Float cell image pan
  if(ST.fcPanDrag){
    const fpd=ST.fcPanDrag;
    if(!fpd.fc.pan)fpd.fc.pan={x:0,y:0,sc:1};
    fpd.fc.pan.x=e.clientX-fpd.sx;
    fpd.fc.pan.y=e.clientY-fpd.sy;
    const fimg=document.getElementById('fimg-'+fpd.fc.id);
    if(fimg){const fox=50+fpd.fc.pan.x/2;const foy=50+fpd.fc.pan.y/2;fimg.style.objectPosition=fox+'% '+foy+'%';fimg.style.transform='scale('+(fpd.fc.pan.sc||1)+')';}
    return;
  }
  // Cover pan
  if(ST.coverPanDrag){
    const page=proj.pages.find(p=>p.type==='cover');if(!page)return;
    if(!page.coverPan)page.coverPan={x:0,y:0,sc:1};
    const z3=ST.zoom||1;
    page.coverPan.x=e.clientX/z3-ST.coverPanDrag.sx;
    page.coverPan.y=e.clientY/z3-ST.coverPanDrag.sy;
    const img=document.getElementById('coverBgImg');
    if(img)img.style.transform=`translate(${page.coverPan.x}px,${page.coverPan.y}px) scale(${page.coverPan.sc||1})`;
    return;
  }
  // Cell image pan
  if(ST.panDrag){
    const pd=ST.panDrag;const pg=proj.pages[pd.pageIdx];
    if(!pg.pans)pg.pans={};if(!pg.pans[pd.idx])pg.pans[pd.idx]={x:0,y:0,sc:1};
    pg.pans[pd.idx].x=e.clientX-pd.sx;
    pg.pans[pd.idx].y=e.clientY-pd.sy;
    const img=document.getElementById('ci-'+pd.pageIdx+'-'+pd.idx);
    if(img){const ox4=50+pg.pans[pd.idx].x/2;const oy4=50+pg.pans[pd.idx].y/2;img.style.objectPosition=ox4+'% '+oy4+'%';img.style.transform='scale('+(pg.pans[pd.idx].sc||1)+')';}
    return;
  }
  // Cell resize
  if(ST.cellResize){
    const cr=ST.cellResize;const page=proj.pages[cr.pageIdx];if(!page.flexes)page.flexes={};
    const delta=cr.isH?(e.clientY-cr.sy)/100:(e.clientX-cr.sx)/100;
    const total=cr.sf+cr.nf;
    const nf=Math.max(0.2,Math.min(total-0.2,cr.sf+delta));
    page.flexes[cr.idx]=nf;page.flexes[cr.ni]=total-nf;
    // Live DOM update
    const c1=document.getElementById(`cell-${cr.pageIdx}-${cr.idx}`);
    const c2=document.getElementById(`cell-${cr.pageIdx}-${cr.ni}`);
    if(c1)c1.style.flex=nf;if(c2)c2.style.flex=total-nf;
    return;
  }
  // Element drag/resize
  if(!ST.drag)return;
  const dd=ST.drag;
  if(dd.mode==='resize'){
    const dx=e.clientX-dd.sx;const dy=e.clientY-dd.sy;
    let nw=dd.ow,nh=dd.oh;
    if(dd.corner==='br'||dd.corner==='tr')nw=Math.max(50,dd.ow+dx);
    if(dd.corner==='bl'||dd.corner==='tl')nw=Math.max(50,dd.ow-dx);
    if(dd.corner==='br'||dd.corner==='bl')nh=Math.max(30,dd.oh+dy);
    if(dd.corner==='tr'||dd.corner==='tl')nh=Math.max(30,dd.oh-dy);
    // For tl/bl corners, move element position too (resize from left/top)
    if(dd.corner==='tl'||dd.corner==='bl'){
      const wDiff=nw-(dd.obj.w||dd.ow);
      dd.obj.x=Math.max(0,(dd.obj.x||0)-wDiff);
      dd.el.style.left=dd.obj.x+'px';
    }
    if(dd.corner==='tl'||dd.corner==='tr'){
      const hDiff=nh-(dd.obj.h||dd.oh);
      dd.obj.y=Math.max(0,(dd.obj.y||0)-hDiff);
      dd.el.style.top=dd.obj.y+'px';
    }
    dd.obj.w=nw;dd.obj.h=nh;
    dd.el.style.width=nw+'px';dd.el.style.height=nh+'px';
    // Update font size and tail inline — no full re-render
    if(dd.el.classList.contains('bub')){
      const bi=dd.el.querySelector('.bi');
      if(bi){
        // Only auto-scale if user hasn't manually set fontSize
        if(!dd.obj.fontSize){
          const fs=Math.max(11,Math.round(nh*0.26));
          bi.style.fontSize=fs+'px';
        }
        bi.style.fontWeight='900';
        bi.style.opacity='1';
        bi.style.color=dd.obj.tc||'#000';
      }
      updateTailSVG(dd.obj,nw,nh);
    }
    // Update float cell size badge dynamically
    if(dd.el.classList.contains('fcell')){
      const badge=document.getElementById('fcsize-'+dd.obj.id);
      if(badge)badge.textContent=Math.round(nw*2)+'×'+Math.round(nh*2)+'px';
    }
    return;
  }
  const container=document.getElementById(`inner-${dd.pageIdx}`)||dd.el.closest('.cover-wrap,.back-wrap');
  if(!container)return;
  const pr=container.getBoundingClientRect();
  const z=dd.z||ST.zoom||1;
  let nx=(e.clientX-pr.left)/z-dd.ox;
  let ny=(e.clientY-pr.top)/z-dd.oy;
  // Apply snap
  const snapW=dd.el.offsetWidth/(ST.zoom||1)||80;
  const snapH=dd.el.offsetHeight/(ST.zoom||1)||40;
  const snapResult=calcSnap(nx,ny,snapW,snapH,dd.pageIdx,dd.el.id);
  nx+=snapResult.snapX; ny+=snapResult.snapY;
  showSnapGuides(snapResult.guides,dd.pageIdx);
  // Float cells can go anywhere; regular elements stay inside page
  if(dd.el.classList.contains('fcell')){
    dd.obj.x=nx; dd.obj.y=ny;
  } else {
    dd.obj.x=Math.max(0,nx); dd.obj.y=Math.max(0,ny);
  }
  dd.el.style.left=dd.obj.x+'px';dd.el.style.top=dd.obj.y+'px';
});

function selEl(el){

  if(el.id&&el.id.startsWith('ft-')&&ST.tool==='text')renderLP();

function deselAll(skipRenderLP){document.querySelectorAll('.sel').forEach(e=>e.classList.remove('sel'));ST.selEl=null;ST.selFC=null;const hadBub=!!ST.selBub;ST.selBub=null;if(!skipRenderLP&&ST.tool==='bubble'&&hadBub)renderLP();}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){deselAll();return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='z'){e.preventDefault();undo();return;}
  // Copy style
  if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==='c'){
    e.preventDefault();copyStyle();return;
  }
  // Paste style
  if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==='v'){
    e.preventDefault();pasteStyle();return;
  }
  if(e.ctrlKey&&(e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))){e.preventDefault();redo();return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='d'&&ST.selEl){
    e.preventDefault();
    const id=ST.selEl.id;const pi=ST.editPage;
    if(id.startsWith('bub-'))dupEl('bub',parseInt(id.split('-')[1]),pi);
    else if(id.startsWith('sfx-'))dupEl('sfx',parseInt(id.split('-')[1]),pi);
    else if(id.startsWith('ft-'))dupEl('txt',parseInt(id.split('-')[1]),pi);
    return;
  }
  if((e.key==='Delete'||e.key==='Backspace')&&ST.selEl&&document.activeElement.tagName!=='INPUT'&&!document.activeElement.isContentEditable){
    const id=ST.selEl.id;const pi=ST.editPage;
    if(id.startsWith('bub-'))delBub(parseInt(id.split('-')[1]),pi);
    else if(id.startsWith('sfx-'))delSfx(parseInt(id.split('-')[1]),pi);
    else if(id.startsWith('ft-'))delTxt(parseInt(id.split('-')[1]),pi);
    else if(id.startsWith('fc-'))delFloatCell(parseInt(id.split('-')[1]),pi);
  }
});

function flipPage(dir){
  const ns=ST.spread+dir;if(ns<0||ns>maxSpreads())return;
  const book=document.querySelector('.book');
  book.style.transition='opacity .32s,transform .32s';
  book.style.opacity='0';book.style.transform=`rotateY(${dir>0?-7:7}deg) scale(.97)`;
  setTimeout(()=>{
    ST.spread=ns;ST.selBub=null;
    // Set editPage to first inner page in new spread
    const{li,ri}=pagesForSpread(ST.spread);
    const cands=[li,ri].filter(i=>proj.pages[i]&&proj.pages[i].type==='inner');
    if(cands.length)ST.editPage=cands[0];
    renderBook();
    book.style.transition='none';book.style.opacity='0';book.style.transform=`rotateY(${dir>0?7:-7}deg) scale(.97)`;
    setTimeout(()=>{book.style.transition='opacity .38s,transform .38s';book.style.opacity='1';book.style.transform='rotateY(0deg) scale(1)';renderLP();},20);
  },300);
}

function copyCurrentPage(){
  const page=apg();if(!page||page.type==='back'){alert('No se puede copiar la contratapa.');return;}
  const copy=JSON.parse(JSON.stringify(page));
  copy.note=(copy.note?copy.note+' ':'')+'(copia)';
  // Insert after current page, before back
  const bi=proj.pages.findIndex(p=>p.type==='back');
  const insertAt=Math.min(ST.editPage+1,bi);
  proj.pages.splice(insertAt,0,copy);
  ST.editPage=insertAt;
  ST.spread=Math.min(Math.ceil(insertAt/2),maxSpreads());
  addHist('Página copiada');renderBook();renderLP();renderThumbStrip();scheduleSave();
}

function deletePage(){
  const page=apg();
  if(!page){return;}
  if(page.type==='cover'){alert('No se puede eliminar la portada.');return;}
  if(page.type==='back'){alert('No se puede eliminar la contratapa.');return;}
  const innerCount=proj.pages.filter(p=>p.type==='inner').length;
  if(innerCount<=1){alert('Debe haber al menos una página interior.');return;}
  if(!confirm('¿Eliminar esta página?'))return;
  proj.pages.splice(ST.editPage,1);
  // Recalculate editPage and spread
  const newEdit=Math.min(ST.editPage,proj.pages.length-1);
  ST.editPage=newEdit;
  ST.spread=Math.min(newEdit===0?0:Math.ceil(newEdit/2),maxSpreads());
  ST.drawCell=null;
  addHist('Página eliminada');renderBook();renderLP();renderThumbStrip();scheduleSave();
}

// ══════════════════════════════════════════
// TOOL
// ══════════════════════════════════════════
function setTool(t){
  ST.tool=t;
  // Reset draw cell when switching away from draw
  if(t!=='draw')ST.drawCell=null;
  ['tImg','tBub','tSfx','tTxt','tDrw','tAI'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('on');});
  const m={image:'tImg',bubble:'tBub',sfx:'tSfx',text:'tTxt',draw:'tDrw',ai:'tAI'};
  if(m[t])document.getElementById(m[t]).classList.add('on');
  renderBook();renderLP();
}

// ══════════════════════════════════════════
// LEFT PANEL
// ══════════════════════════════════════════
function switchTab(tab,btn){
  ST.lpTab=tab;
  document.querySelectorAll('.lpt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderLP();
}

function renderLP(){
  const c=document.getElementById('lpc');c.innerHTML='';
  if(ST.lpTab==='layers'){renderLayersP(c);return;}
  if(ST.lpTab==='history'){renderHistP(c);return;}
  if(ST.lpTab==='theme'){renderThemeP(c);return;}
  if(ST.tool==='ai'){renderAIP(c);return;}
  if(ST.tool==='bubble'){renderBubP(c);return;}
  if(ST.tool==='sfx'){renderSfxP(c);return;}
  if(ST.tool==='text'){renderTxtP(c);return;}
  if(ST.tool==='draw'){renderDrawP(c);return;}
  renderImgP(c);
}

      it.style.cssText='cursor:pointer;';

      const nm=document.createElement('span');nm.className='li-nm';nm.textContent=(fc.image?'Con imagen':'Sin imagen')+' #'+(i+1);
